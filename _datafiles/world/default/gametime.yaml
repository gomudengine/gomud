#
# This file defines the rules around date/time calendar configurations.
# It allows for different systems that can be used different places, such as another planet, dimension, etc.
# Each named configuration is fully self-contained.
#    
calendars:
  # The `default` calendar is used for all calculations currently.
  default:
    # How many game rounds make up one full in-game day.
    rounds_per_day: 900
    # How many of the full days hours are considered night.
    # Night is split evenly across midnight: half before, half after.
    # e.g. 8 night hours => night from 20:00 to 04:00.
    night_hours: 8
    # How many hours before NightStart the "dusk" color begins.
    dusk_hours: 3
    # Number of days in a year. Drives year/month math.
    days_per_year: 365
    # Number of days in a week.
    days_per_week: 7
    # Number of suns in the sky. Valid range: 1-2.
    sun_count: 1
    # Number of moons in the sky. Valid range: 0-3.
    moon_count: 2
    # Month definitions, in order. The number of months is derived from this list.
    # Each month spans an equal share of the year.
    months:
      - Arvalon
      - Beldris
      - Celmara
      - Durelin
      - Esmira
      - Ferulan
      - Glimar
      - Hestara
      - Irinel
      - Jorenth
      - Keldris
      - Luneth
    # Year animals, cycled in order (shuffled at startup by the world seed).
    # Any number of entries is valid.
