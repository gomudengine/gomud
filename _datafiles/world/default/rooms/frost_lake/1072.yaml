title: Lake House
description: 'The lake house smells faintly of woodsmoke, wet cedar, and something
  older beneath it all - a cold mineral scent that drifts in from Frost Lake whenever
  the wind presses against the warped shutters. The interior is cramped but meticulously
  maintained: thick wool blankets hang over the windows to keep out the biting night
  air, and iron lanterns burn with blue-tinted oil that throws strange shadows across
  the knotty pine walls. Crocodile hides, pale and scarred from the freezing water,
  are stretched across the floor like rugs, while rusted fishing hooks and carved
  bone charms dangle from the rafters.'
