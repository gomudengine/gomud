title: The Mayors House
description: As you step into the entryway of the mayor's house, a sense of authority
  and refinement is immediately apparent. Polished stone floors gleam beneath the
  warm glow of iron lanterns mounted along the walls, their light reflecting off rich
  tapestries depicting the history and triumphs of Frostfang. A broad staircase rises
  toward the upper floors, while sturdy oak doors lead deeper into the residence and
  its halls of governance. Decorative suits of armor stand watch beside carefully
  carved benches and tables adorned with fresh winter flowers in silver vases. The
  faint scent of pine and burning cedar lingers in the air, lending warmth to the
  otherwise imposing chamber. Every detail of the entryway speaks of prestige, duty,
  and the enduring strength of Frostfang's leadership.
