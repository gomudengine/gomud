title: Threshold to the Slums
description: The air grows fouler as the street narrows, the wind dragging with it
  the stench of rot and neglect that clings to the threshold of the slums. Here, the
  buildings sag inward like broken teeth, their walls patched with scavenged boards
  and stained by years of hardship, while the few open windows glow dimly behind ragged
  coverings. Movement flickers at the edges of sight-too quick, too deliberate-and
  vanishes the moment it's noticed. The quiet is no comfort; it feels occupied, thick
  with unseen presence, as if the street itself is holding its breath. Somewhere in
  the distance, a muffled clatter or hushed voice rises and dies just as quickly,
  leaving only unease behind. This is no place for the unguarded, especially not at
  night, where every shadow seems deeper than it should be, and every step feels like
  a trespass.
