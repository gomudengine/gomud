{{template "header" .}}

<style>
    main {
        max-width: none;
        padding: 0 1rem 1rem 1rem;
        margin-top: 1rem;
    }
    h1 { margin-bottom: 0.25rem; }
    .subtitle { color: var(--color-text-dim); font-size: 0.85rem; margin-bottom: 0.75rem; }
    .subtitle a { color: var(--color-link); }

    .mapper-toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 8px;
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: 4px;
        margin-bottom: 6px;
        flex-wrap: wrap;
    }
    .mapper-toolbar select {
        padding: 4px 6px;
        font-size: 0.82rem;
        font-family: monospace;
        background: var(--color-surface-white);
        color: var(--color-text);
        border: 1px solid var(--color-border);
        border-radius: 3px;
        min-width: 160px;
    }
    .mapper-toolbar .sep {
        width: 1px;
        height: 20px;
        background: var(--color-border);
    }
    .mapper-tabs { display: flex; gap: 2px; }
    .mapper-tabs button {
        padding: 3px 10px;
        font-size: 0.78rem;
        font-family: monospace;
        background: var(--color-surface-white);
        color: var(--color-text-dim);
        border: 1px solid var(--color-border);
        border-radius: 3px;
        cursor: pointer;
    }
    .mapper-tabs button:hover { color: var(--color-text); }
    .mapper-tabs button.active {
        background: var(--color-primary);
        color: #fff;
        border-color: var(--color-primary);
    }
    .mapper-controls { display: flex; gap: 2px; align-items: center; }
    .mapper-controls button {
        width: 24px; height: 24px;
        padding: 0;
        font-size: 14px; line-height: 1;
        font-family: monospace;
        background: var(--color-surface-white);
        color: var(--color-text-dim);
        border: 1px solid var(--color-border);
        border-radius: 3px;
        cursor: pointer;
    }
    .mapper-controls button:hover { color: var(--color-text); background: var(--color-surface); }
    .mapper-controls button.active {
        background: var(--color-primary);
        color: #fff;
        border-color: var(--color-primary);
    }
    .mapper-controls .ctrl-sep {
        width: 1px; height: 16px;
        background: var(--color-border);
        margin: 0 3px;
    }
    .mapper-z-controls { display: flex; gap: 2px; align-items: center; }
    .mapper-z-controls span { font-size: 0.72rem; color: var(--color-text-dim); font-family: monospace; }

    .mapper-body {
        display: flex;
        gap: 6px;
        height: calc(100vh - 180px);
        min-height: 400px;
    }
    .mapper-viewport {
        flex: 1;
        position: relative;
        overflow: hidden;
        background: #111;
        border: 1px solid var(--color-border);
        border-radius: 4px;
    }
    .mapper-viewport canvas {
        display: block;
        position: absolute;
        top: 0; left: 0;
        cursor: grab;
    }

    .mapper-info-panel {
        width: 260px;
        flex-shrink: 0;
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: 4px;
        padding: 8px 10px;
        overflow-y: auto;
        font-size: 0.8rem;
        font-family: monospace;
    }
    .mapper-info-panel h3 {
        margin: 0 0 6px 0;
        font-size: 0.85rem;
        color: var(--color-text);
    }
    .mapper-info-panel .info-empty {
        color: var(--color-text-dim);
        font-style: italic;
    }
    .mapper-info-panel .info-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 8px;
        line-height: 1.8;
    }
    .mapper-info-panel .info-label {
        color: var(--color-text-dim);
        text-transform: uppercase;
        font-size: 0.75rem;
        flex-shrink: 0;
    }
    .mapper-info-panel .info-value {
        color: var(--color-text);
        text-align: right;
        word-break: break-word;
    }
    .mapper-info-panel .info-divider {
        border: none;
        border-top: 1px solid var(--color-border);
        margin: 6px 0;
    }
    .mapper-info-panel .info-link {
        display: inline-block;
        margin-top: 6px;
        font-size: 0.78rem;
        color: var(--color-link);
    }
    .mapper-info-panel .info-exits {
        margin-top: 4px;
    }
    .mapper-info-panel .info-exit-row {
        display: flex;
        justify-content: space-between;
        gap: 6px;
        line-height: 1.6;
        font-size: 0.75rem;
    }
    .mapper-info-panel .info-exit-dir { color: var(--color-text-dim); }
    .mapper-info-panel .info-exit-id { color: var(--color-text); }
    .mapper-info-panel .info-badges {
        display: flex;
        flex-wrap: wrap;
        gap: 3px;
        margin-top: 4px;
    }
    .mapper-info-panel .info-badge {
        font-size: 0.65rem;
        padding: 1px 4px;
        border-radius: 3px;
        background: var(--color-surface-white);
        color: var(--color-text-dim);
        border: 1px solid var(--color-border);
    }
    .mapper-info-panel .info-badge.secret { color: #d4a843; border-color: #d4a843; }
    .mapper-info-panel .info-badge.locked { color: #9ab0d4; border-color: #9ab0d4; }

    #mapper-tooltip {
        position: fixed;
        z-index: 99999;
        pointer-events: none;
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: 6px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.5);
        padding: 8px 10px;
        min-width: 140px;
        max-width: 260px;
        display: none;
        font-family: monospace;
        font-size: 0.78rem;
    }
    #mapper-tooltip .tt-title { font-weight: bold; color: var(--color-text); margin-bottom: 2px; }
    #mapper-tooltip .tt-id { color: var(--color-text-dim); font-size: 0.7rem; }
    #mapper-tooltip .tt-row { display: flex; justify-content: space-between; gap: 8px; line-height: 1.6; }
    #mapper-tooltip .tt-label { color: var(--color-text-dim); font-size: 0.72rem; text-transform: uppercase; }
    #mapper-tooltip .tt-value { color: var(--color-text); }
    #mapper-tooltip .tt-divider { border: none; border-top: 1px solid var(--color-border); margin: 4px 0; }

    .mapper-ctx-menu {
        position: fixed;
        z-index: 99998;
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: 4px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.5);
        min-width: 160px;
        padding: 4px 0;
        font-family: monospace;
        font-size: 0.8rem;
        display: none;
    }
    .mapper-ctx-menu .ctx-header {
        padding: 4px 10px;
        color: var(--color-text-dim);
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        border-bottom: 1px solid var(--color-border);
        margin-bottom: 2px;
    }
    .mapper-ctx-menu .ctx-item {
        display: block;
        width: 100%;
        padding: 5px 10px;
        background: none;
        border: none;
        color: var(--color-text);
        font-family: monospace;
        font-size: 0.8rem;
        text-align: left;
        cursor: pointer;
    }
    .mapper-ctx-menu .ctx-item:hover {
        background: var(--color-primary);
        color: #fff;
    }

    .mapper-save-controls {
        display: none;
        gap: 4px;
        align-items: center;
    }
    .mapper-save-controls.visible { display: flex; }
    .mapper-save-controls button {
        padding: 3px 10px;
        font-size: 0.78rem;
        font-family: monospace;
        border: 1px solid var(--color-border);
        border-radius: 3px;
        cursor: pointer;
    }
    .mapper-save-controls .btn-save {
        background: #2a7a2a;
        color: #fff;
        border-color: #2a7a2a;
    }
    .mapper-save-controls .btn-save:hover { background: #35953a; }
    .mapper-save-controls .btn-discard {
        background: var(--color-surface-white);
        color: var(--color-text-dim);
    }
    .mapper-save-controls .btn-discard:hover { color: var(--color-text); }
    .mapper-save-controls .dirty-count {
        font-size: 0.72rem;
        color: #d4a843;
        font-family: monospace;
    }

    .mapper-changelog {
        margin-top: 6px;
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: 4px;
        padding: 6px 10px;
        max-height: 160px;
        overflow-y: auto;
        font-family: monospace;
        font-size: 0.75rem;
        line-height: 1.5;
        display: none;
    }
    .mapper-changelog.visible { display: block; }
    .mapper-changelog .cl-title {
        font-size: 0.72rem;
        color: var(--color-text-dim);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin-bottom: 4px;
    }
    .mapper-changelog .cl-entry { color: var(--color-text); }
    .mapper-changelog .cl-entry .cl-action { color: var(--color-text-dim); }
    .mapper-changelog .cl-entry.cl-move .cl-action { color: #6aacf0; }
    .mapper-changelog .cl-entry.cl-create .cl-action { color: #5fb77a; }
    .mapper-changelog .cl-entry.cl-delete .cl-action { color: #ff6b6b; }
    .mapper-changelog .cl-entry.cl-exit-add .cl-action { color: #a8d86e; }
    .mapper-changelog .cl-entry.cl-exit-remove .cl-action { color: #d4a843; }

    .mapper-loading {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--color-text-dim);
        font-family: monospace;
        font-size: 0.85rem;
        background: rgba(0,0,0,0.6);
        z-index: 5;
    }
    .mapper-loading.hidden { display: none; }

    .mapper-stats {
        font-size: 0.72rem;
        color: var(--color-text-dim);
        font-family: monospace;
        margin-left: auto;
    }
</style>

<h1>Zone Mapper</h1>

<div class="mapper-toolbar">
    <select id="zone-select"><option value="">-- select zone --</option></select>
    <span class="sep"></span>
    <div class="mapper-tabs">
        <button class="tab-btn active" data-tab="2d" onclick="switchTab('2d')">2D</button>
        <button class="tab-btn" data-tab="3d" onclick="switchTab('3d')">3D</button>
    </div>
    <span class="sep"></span>
    <div class="mapper-controls">
        <button onclick="zoomOut()" title="Zoom out">&minus;</button>
        <button onclick="zoomIn()" title="Zoom in">+</button>
        <span class="ctrl-sep"></span>
        <button onclick="centerCamera()" title="Re-center on root room">&#8982;</button>
    </div>
    <div class="mapper-z-controls" id="z-controls">
        <span class="ctrl-sep"></span>
        <span>Z:</span>
        <div id="z-buttons"></div>
    </div>
    <div class="mapper-controls" id="spacing-controls" style="display:none">
        <span class="ctrl-sep"></span>
        <button onclick="spacingDown()" title="Decrease spacing">&darr;</button>
        <button onclick="spacingUp()" title="Increase spacing">&uarr;</button>
    </div>
    <div class="mapper-save-controls" id="save-controls">
        <span class="sep"></span>
        <span class="dirty-count" id="dirty-count"></span>
        <button class="btn-save" onclick="saveAllChanges()">Save Changes</button>
        <button class="btn-discard" onclick="discardChanges()">Discard</button>
    </div>
    <span class="mapper-stats" id="mapper-stats"></span>
</div>

<div class="mapper-body">
    <div class="mapper-viewport" id="mapper-viewport">
        <canvas id="mapper-canvas"></canvas>
        <div class="mapper-loading hidden" id="mapper-loading">Loading zone data...</div>
    </div>
    <div class="mapper-info-panel" id="mapper-info-panel">
        <h3>Room Info</h3>
        <div class="info-empty" id="info-empty">Click a room to see details</div>
        <div id="info-content" style="display:none"></div>
    </div>
</div>

<div class="mapper-changelog" id="mapper-changelog">
    <div class="cl-title">Pending Changes</div>
    <div id="changelog-entries"></div>
</div>

<div id="mapper-tooltip"></div>
<div id="mapper-ctx-menu" class="mapper-ctx-menu"></div>

<script>

// =========================================================================
// Constants

var ZOOM_STEP = 1.25;

var CENTER_EASE_DURATION = 0.2;

var ROOM_SIZE_2D       = 28;
var ROOM_GAP_2D        = 14;
var BASE_STEP_2D       = ROOM_SIZE_2D + ROOM_GAP_2D;
var CONNECTION_WIDTH_2D = 4;
var ROOM_BORDER_WIDTH_2D = 1.5;
var SYMBOL_FONT_SIZE_2D  = 14;
var MAP_BG_2D            = '#111';
var ROOM_BORDER_COLOR_2D = '#000000';

var TILE_HW_3D          = 20;
var TILE_HH_3D          = 10;
var TILE_DEPTH_3D       = 7;
var GRID_STEP_XY_3D     = 1.6;
var Z_STEP_3D           = 50;
var Z_SPACING_EXP_3D    = 1.5;
var CONNECTION_WIDTH_3D  = 2;
var MAP_BG_3D            = '#000';
var TILE_BORDER_COLOR_3D = '#000';
var TILE_BORDER_WIDTH_3D = 0.8;
var SIDE_DARKEN_3D       = 0.55;
var SYMBOL_FONT_SIZE_3D  = 11;
var SPACING_STEP_3D      = 1.25;
var SPACING_MIN_3D       = 0.6;
var SPACING_MAX_3D       = 4.0;
var ALPHA_INACTIVE_3D    = 0.0;
var ALPHA_CONNECTED_3D   = 0.30;
var CONN_COLOR_SAME_Z    = '#ffffff';
var CONN_COLOR_CROSS_Z   = '#3a6b8a';
var CROSS_Z_OFFSET_X     = 8;
var CROSS_Z_ARROW_SIZE   = 6;

var CONNECTION_COLOR          = '#7a4a1a';
var ABNORMAL_CONNECTION_COLOR = '#d4c050';
var SELECTED_ROOM_COLOR     = '#1a6abf';
var SELECTED_ROOM_TEXT_COLOR = '#ffffff';
var SYMBOL_TEXT_COLOR        = '#e0e0e0';
var DEFAULT_ROOM_COLOR       = '#3a3a4a';

var SYMBOL_COLORS = {
    '~':  '#2a53f7',
    '≈': '#0033cd',
    '♣': '#1a6b1a',
    '♨': '#4a6b20',
    '❄': '#b8d8f0',
    '⌬': '#5a4a38',
    '⩕': '#7a6a50',
    '▼': '#8a7a5a',
    '⌂': '#8a6a3a',
    '*':  '#d4aa55',
    "'":  '#6a8a30',
    '=':  '#a07840',
    '$':  '#2a7a2a',
    '%':  '#2a5a8a',
    '♜': '#4a4a4a',
    '+':  '#5fb7ff',
    '•': '#3a3a4a'
};

var ENVIRONMENT_SYMBOLS = {
    'Forest':    '♣',
    'Swamp':     '♨',
    'Snow':      '❄',
    'Cave':      '⌬',
    'Dungeon':   '⌬',
    'Mountains': '⩕',
    'Cliffs':    '▼',
    'House':     '⌂',
    'Desert':    '*',
    'Farmland':  "'",
    'Road':      '=',
    'Shore':     '~',
    'Water':     '≈'
};

var ENVIRONMENT_COLORS = {
    'Forest':    '#1a6b1a',
    'Swamp':     '#4a6b20',
    'Snow':      '#b8d8f0',
    'Cave':      '#5a4a38',
    'Dungeon':   '#5a4a38',
    'Mountains': '#7a6a50',
    'Cliffs':    '#8a7a5a',
    'House':     '#8a6a3a',
    'Desert':    '#d4aa55',
    'Farmland':  '#6a8a30',
    'Road':      '#a07840',
    'Shore':     '#2a53f7',
    'Water':     '#0033cd',
    'City':      '#5a5a6a',
    'Fort':      '#5a5a6a',
    'Land':      '#3a3a4a'
};

var BIOME_SYMBOLS = {};
var BIOME_COLORS = {};

var DIRECTION_DELTAS = {
    'north': [0,-1,0], 'south': [0,1,0], 'west': [-1,0,0], 'east': [1,0,0],
    'northwest': [-1,-1,0], 'northeast': [1,-1,0], 'southwest': [-1,1,0], 'southeast': [1,1,0],
    'down': [0,0,-1], 'up': [0,0,1],
    'north-x2': [0,-2,0], 'south-x2': [0,2,0], 'west-x2': [-2,0,0], 'east-x2': [2,0,0],
    'northwest-x2': [-2,-2,0], 'northeast-x2': [2,-2,0], 'southwest-x2': [-2,2,0], 'southeast-x2': [2,2,0],
    'north-x3': [0,-3,0], 'south-x3': [0,3,0], 'west-x3': [-3,0,0], 'east-x3': [3,0,0],
    'northwest-x3': [-3,-3,0], 'northeast-x3': [3,-3,0], 'southwest-x3': [-3,3,0], 'southeast-x3': [3,3,0],
    'north-gap': [0,-1,0], 'south-gap': [0,1,0], 'west-gap': [-1,0,0], 'east-gap': [1,0,0],
    'northwest-gap': [-1,-1,0], 'northeast-gap': [1,-1,0], 'southwest-gap': [-1,1,0], 'southeast-gap': [1,1,0],
    'north-gap2': [0,-2,0], 'south-gap2': [0,2,0], 'west-gap2': [-2,0,0], 'east-gap2': [2,0,0],
    'northwest-gap2': [-2,-2,0], 'northeast-gap2': [2,-2,0], 'southwest-gap2': [-2,2,0], 'southeast-gap2': [2,2,0],
    'north-gap3': [0,-3,0], 'south-gap3': [0,3,0], 'west-gap3': [-3,0,0], 'east-gap3': [3,0,0],
    'northwest-gap3': [-3,-3,0], 'northeast-gap3': [3,-3,0], 'southwest-gap3': [-3,3,0], 'southeast-gap3': [3,3,0]
};

var DIRECTIONAL_EXITS = {
    'north': true, 'south': true, 'east': true, 'west': true,
    'northeast': true, 'northwest': true, 'southeast': true, 'southwest': true,
    'up': true, 'down': true
};

function isDirectionalExit(dir) {
    return DIRECTIONAL_EXITS[dir] === true || DIRECTION_DELTAS[dir] !== undefined;
}

// =========================================================================
// Helpers
// =========================================================================

function symbolForRoom(room) {
    if (room.MapSymbol) return room.MapSymbol;
    var env = biomeEnvName(room.Biome);
    if (env && ENVIRONMENT_SYMBOLS[env]) return ENVIRONMENT_SYMBOLS[env];
    if (room.Biome && BIOME_SYMBOLS[room.Biome]) return BIOME_SYMBOLS[room.Biome];
    return '•';
}

function colorForSymbol(sym, biome) {
    if (sym && SYMBOL_COLORS[sym]) return SYMBOL_COLORS[sym];
    var env = biomeEnvName(biome);
    if (env && ENVIRONMENT_COLORS[env]) return ENVIRONMENT_COLORS[env];
    if (biome && BIOME_COLORS[biome]) return BIOME_COLORS[biome];
    return DEFAULT_ROOM_COLOR;
}

function biomeEnvName(biomeId) {
    if (!biomeId) return '';
    if (ENVIRONMENT_COLORS[biomeId]) return biomeId;
    return biomeEnvMap[biomeId] || '';
}
var biomeEnvMap = {};

function smoothstep(t) { return t * t * (3 - 2 * t); }

function darkenColor(hex, factor) {
    var r = Math.min(255, Math.round(parseInt(hex.slice(1,3), 16) * factor));
    var g = Math.min(255, Math.round(parseInt(hex.slice(3,5), 16) * factor));
    var b = Math.min(255, Math.round(parseInt(hex.slice(5,7), 16) * factor));
    return '#' + ('0'+r.toString(16)).slice(-2) + ('0'+g.toString(16)).slice(-2) + ('0'+b.toString(16)).slice(-2);
}

function exitDelta(dir, room) {
    var ex = room.Exits && room.Exits[dir];
    if (ex && ex.MapDirection && DIRECTION_DELTAS[ex.MapDirection]) return DIRECTION_DELTAS[ex.MapDirection];
    if (DIRECTION_DELTAS[dir]) return DIRECTION_DELTAS[dir];
    return null;
}

function sign(v) { return v > 0 ? 1 : (v < 0 ? -1 : 0); }

function buildDragConstraints(roomId, groupSet) {
    var room = mapperData.rooms.get(roomId);
    if (!room) return [];
    var constraints = [];

    // Outgoing exits: from this room to neighbors outside the group
    if (room.Exits) {
        for (var dir in room.Exits) {
            var ex = room.Exits[dir];
            if (groupSet && groupSet.has(ex.RoomId)) continue;
            var delta = exitDelta(dir, room);
            if (!delta || (delta[0] === 0 && delta[1] === 0)) continue;
            var dest = mapperData.rooms.get(ex.RoomId);
            if (!dest || !dest.HasCoordinates) continue;
            constraints.push({
                signDx: sign(delta[0]),
                signDy: sign(delta[1]),
                refX: dest.MapX,
                refY: dest.MapY,
                ownerGx: room.MapX,
                ownerGy: room.MapY,
                ownerId: roomId,
                outgoing: true
            });
        }
    }

    // Incoming exits: from neighbors outside the group pointing at this room
    mapperData.rooms.forEach(function(other, otherId) {
        if (otherId === roomId || !other.HasCoordinates || !other.Exits) return;
        if (groupSet && groupSet.has(otherId)) return;
        for (var dir in other.Exits) {
            var ex = other.Exits[dir];
            if (ex.RoomId !== roomId) continue;
            var delta = exitDelta(dir, other);
            if (!delta || (delta[0] === 0 && delta[1] === 0)) continue;
            constraints.push({
                signDx: sign(delta[0]),
                signDy: sign(delta[1]),
                refX: other.MapX,
                refY: other.MapY,
                ownerGx: room.MapX,
                ownerGy: room.MapY,
                ownerId: roomId,
                outgoing: false
            });
        }
    });

    return constraints;
}

function isExitConstraintSatisfied(c, gx, gy) {
    var dx, dy;
    if (c.outgoing) {
        dx = c.refX - gx;
        dy = c.refY - gy;
    } else {
        dx = gx - c.refX;
        dy = gy - c.refY;
    }
    // Sign must match
    if (c.signDx !== 0 && sign(dx) !== c.signDx) return false;
    if (c.signDy !== 0 && sign(dy) !== c.signDy) return false;
    // Cardinal: axis-aligned (zero component must stay zero)
    if (c.signDx === 0 && dx !== 0) return false;
    if (c.signDy === 0 && dy !== 0) return false;
    // Intercardinal: must stay on the exact diagonal (|dx| == |dy|)
    if (c.signDx !== 0 && c.signDy !== 0 && Math.abs(dx) !== Math.abs(dy)) return false;
    return true;
}

function computeBrokenExits(gx, gy, constraints) {
    var broken = [];
    for (var i = 0; i < constraints.length; i++) {
        if (!isExitConstraintSatisfied(constraints[i], gx, gy)) {
            broken.push(constraints[i]);
        }
    }
    return broken;
}

var mapperData = {
    allZones: [],
    currentZone: null,
    rawRooms: [],
    rooms: new Map(),
    roomsByCoord: new Map(),
    zLevels: [],
    zoneRootRooms: new Map(),
    zoneOffsets: new Map(),
    visibleZones: new Set(),
};

async function loadBiomes() {

    var biomeList = res.ok && res.data ? res.data.data : null;
    if (Array.isArray(biomeList)) {

            if (b.Symbol) BIOME_SYMBOLS[b.BiomeId || b.Name] = b.Symbol;
        });

}

async function loadAllRooms() {
    showLoading(true);
    var res = await AdminAPI.get('/admin/api/v1/mapper/rooms', true);
    showLoading(false);
    var data = res.ok && res.data ? res.data.data : null;
    if (!data) return;

    mapperData.allZones = data.Zones || [];
    mapperData.zoneRootRooms.clear();
    mapperData.allZones.forEach(function(z) {
        mapperData.zoneRootRooms.set(z.Name, z.RoomId);
    });

    mapperData.rawRooms = (data.Rooms || []).map(function(r) {
        r._symbol = symbolForRoom(r);
        r._color  = colorForSymbol(r._symbol, r.Biome);
        return r;
    });

    if (mapperData.currentZone) {
        applyZoneLayout(mapperData.currentZone);
    }
}

function buildCrossZoneGraph(rawRooms) {
    var roomById = new Map();
    rawRooms.forEach(function(r) { roomById.set(r.RoomId, r); });

    var edges = new Map();
    rawRooms.forEach(function(r) {
        if (!r.HasCoordinates || !r.Zone || !r.Exits) return;
        for (var dir in r.Exits) {
            if (!isDirectionalExit(dir)) continue;
            var delta = DIRECTION_DELTAS[dir];
            if (!delta || (delta[0] === 0 && delta[1] === 0 && delta[2] === 0)) continue;
            var dest = roomById.get(r.Exits[dir].RoomId);
            if (!dest || !dest.HasCoordinates || !dest.Zone) continue;
            if (dest.Zone === r.Zone) continue;
            var key = r.Zone + '>' + dest.Zone;
            if (!edges.has(key)) {
                edges.set(key, {
                    fromZone: r.Zone, toZone: dest.Zone,
                    fromX: r.MapX, fromY: r.MapY,
                    toX: dest.MapX, toY: dest.MapY,
                    dx: delta[0], dy: delta[1]
                });
            }
        }
    });
    return edges;
}

function applyZoneLayout(centerZone) {
    mapperData.currentZone = centerZone;
    mapperData.rooms.clear();
    mapperData.roomsByCoord.clear();
    mapperData.zoneOffsets.clear();
    mapperData.visibleZones.clear();

    var graph = buildCrossZoneGraph(mapperData.rawRooms);

    // BFS from centerZone through directional cross-zone exits
    var adj = new Map();
    graph.forEach(function(edge) {
        if (!adj.has(edge.fromZone)) adj.set(edge.fromZone, []);
        adj.get(edge.fromZone).push(edge);
    });

    mapperData.zoneOffsets.set(centerZone, { dx: 0, dy: 0 });
    mapperData.visibleZones.add(centerZone);
    var queue = [centerZone];

    while (queue.length > 0) {
        var zone = queue.shift();
        var myOff = mapperData.zoneOffsets.get(zone);
        var neighbors = adj.get(zone) || [];
        neighbors.forEach(function(edge) {
            if (mapperData.visibleZones.has(edge.toZone)) return;
            var dx = myOff.dx + (edge.fromX + edge.dx) - edge.toX;
            var dy = myOff.dy + (edge.fromY + edge.dy) - edge.toY;
            mapperData.zoneOffsets.set(edge.toZone, { dx: dx, dy: dy });
            mapperData.visibleZones.add(edge.toZone);
            queue.push(edge.toZone);
        });
    }

    // Populate rooms for visible zones only, applying offsets
    var zSet = new Set();
    mapperData.rawRooms.forEach(function(r) {
        if (!r.Zone || !mapperData.visibleZones.has(r.Zone)) return;
        var copy = Object.assign({}, r);
        copy.Exits = r.Exits;
        copy._symbol = r._symbol;
        copy._color = r._color;
        copy._serverX = r.MapX;
        copy._serverY = r.MapY;
        if (copy.HasCoordinates) {
            var off = mapperData.zoneOffsets.get(copy.Zone);
            if (off) { copy.MapX = r.MapX + off.dx; copy.MapY = r.MapY + off.dy; }
        }
        mapperData.rooms.set(copy.RoomId, copy);
        if (copy.HasCoordinates) {
            mapperData.roomsByCoord.set(copy.MapX + ',' + copy.MapY + ',' + copy.MapZ, copy.RoomId);
            zSet.add(copy.MapZ);
        }
    });
    mapperData.zLevels = Array.from(zSet).sort(function(a, b) { return a - b; });

    updateStats();
    updateZButtons();
    render();
}

function centerOnZone(zoneName) {
    applyZoneLayout(zoneName);
    var rootId = mapperData.zoneRootRooms.get(zoneName);
    if (rootId) {
        var root = mapperData.rooms.get(rootId);
        if (root && root.HasCoordinates) {
            setCameraTarget(root.MapX, root.MapY, root.MapZ);
            activeZ2d = root.MapZ;
            activeZ3d = root.MapZ;
            updateZButtons();
            return;
        }
    }
    if (mapperData.zLevels.length > 0) {
        activeZ2d = mapperData.zLevels[0];
        activeZ3d = mapperData.zLevels[0];
        updateZButtons();
        render();
    }
}

function roomLabel(roomId) {

function clearDirty() {

function moveRoomLocally(roomId, newGx, newGy) {
    var room = mapperData.rooms.get(roomId);
    if (!room) return;
    var wasTracked = dirty.movedRooms.has(roomId);
    if (!wasTracked) {
        dirty.movedRooms.set(roomId, { origGx: room.MapX, origGy: room.MapY, origGz: room.MapZ });
    }
    var oldGx = room.MapX, oldGy = room.MapY;
    mapperData.roomsByCoord.delete(room.MapX + ',' + room.MapY + ',' + room.MapZ);
    room.MapX = newGx;
    room.MapY = newGy;
    room.HasCoordinates = true;
    mapperData.roomsByCoord.set(newGx + ',' + newGy + ',' + room.MapZ, roomId);
    logChange('cl-move', '<span class="cl-action">MOVE</span> ' + roomLabel(roomId) + ' (' + oldGx + ',' + oldGy + ') &rarr; (' + newGx + ',' + newGy + ')');
    updateSaveButtons();
}

function breakExitLocally(roomId, dir) {
    var room = mapperData.rooms.get(roomId);
    if (room && room.Exits && room.Exits[dir]) {
        var targetId = room.Exits[dir].RoomId;
        delete room.Exits[dir];
        dirty.exitRemovals.push({ roomId: roomId, dir: dir });
        logChange('cl-exit-remove', '<span class="cl-action">REMOVE EXIT</span> "' + escapeHtml(dir) + '" from ' + roomLabel(roomId) + ' (was &rarr; #' + targetId + ')');
        updateSaveButtons();
    }
}

function addExitLocally(sourceRoomId, dir, targetRoomId) {
    var room = mapperData.rooms.get(sourceRoomId);
    if (!room) return;
    if (!room.Exits) room.Exits = {};
    room.Exits[dir] = { RoomId: targetRoomId };
    dirty.exitAdditions.push({ roomId: sourceRoomId, dir: dir, targetRoomId: targetRoomId });
    logChange('cl-exit-add', '<span class="cl-action">ADD EXIT</span> "' + escapeHtml(dir) + '" on ' + roomLabel(sourceRoomId) + ' &rarr; ' + roomLabel(targetRoomId));
    updateSaveButtons();
}

function deleteRoomLocally(roomId) {
    var room = mapperData.rooms.get(roomId);
    if (!room) return;
    var label = roomLabel(roomId);
    mapperData.rooms.forEach(function(other, otherId) {
        if (!other.Exits) return;
        for (var dir in other.Exits) {
            if (other.Exits[dir].RoomId === roomId) breakExitLocally(otherId, dir);
        }
    });
    if (room.HasCoordinates) {
        mapperData.roomsByCoord.delete(room.MapX + ',' + room.MapY + ',' + room.MapZ);
    }
    if (roomId > 0) {
        dirty.deletedRooms.push(roomId);
    } else {
        dirty.createdRooms.delete(roomId);
    }
    mapperData.rooms.delete(roomId);
    selectedRoomIds.delete(roomId);
    logChange('cl-delete', '<span class="cl-action">DELETE</span> ' + label);
    updateSaveButtons();
    updateInfoPanel();
    updateStats();
}

function createRoomLocally(gx, gy, gz) {
    var tempId = dirty.nextTempId--;
    var zoneInfo = mapperData.allZones.find(function(z) { return z.Name === mapperData.currentZone; });
    var biome = zoneInfo ? zoneInfo.DefaultBiome : '';
    var tempRoom = {
        RoomId: tempId, Zone: mapperData.currentZone || '', Title: 'New Room',
        MapX: gx, MapY: gy, MapZ: gz,
        HasCoordinates: true, MapSymbol: '', MapLegend: '', Biome: biome, Exits: {}
    };
    tempRoom._symbol = symbolForRoom(tempRoom);
    tempRoom._color = colorForSymbol(tempRoom._symbol, tempRoom.Biome);
    mapperData.rooms.set(tempId, tempRoom);
    mapperData.roomsByCoord.set(gx + ',' + gy + ',' + gz, tempId);
    if (!mapperData.zLevels.includes(gz)) {
        mapperData.zLevels.push(gz);
        mapperData.zLevels.sort(function(a, b) { return a - b; });
    }
    dirty.createdRooms.set(tempId, { gx: gx, gy: gy, gz: gz, zone: mapperData.currentZone || '' });
    logChange('cl-create', '<span class="cl-action">CREATE</span> New Room at (' + gx + ', ' + gy + ', ' + gz + ') in zone ' + escapeHtml(mapperData.currentZone || '?'));
    updateSaveButtons();
    updateStats();
    return tempId;
}

function applyGroupMove(group, deltaGx, deltaGy) {
    var brokenConstraints = [];
    group.forEach(function(start, roomId) {
        var newGx = start.startGx + deltaGx;
        var newGy = start.startGy + deltaGy;
        moveRoomLocally(roomId, newGx, newGy);
    });

    // Compute and break invalid exits for each room in the group
    group.forEach(function(start, roomId) {
        var room = mapperData.rooms.get(roomId);
        if (!room) return;
        var constraints = buildDragConstraints(roomId);
        constraints.forEach(function(c) {
            if (!isExitConstraintSatisfied(c, room.MapX, room.MapY)) {
                brokenConstraints.push(c);
                if (c.outgoing) {
                    var neighborId = mapperData.roomsByCoord.get(c.refX + ',' + c.refY + ',' + room.MapZ);
                    if (room.Exits) {
                        for (var dir in room.Exits) {
                            if (room.Exits[dir].RoomId === neighborId) {
                                breakExitLocally(roomId, dir);
                            }
                        }
                    }
                } else {
                    var neighborId2 = mapperData.roomsByCoord.get(c.refX + ',' + c.refY + ',' + room.MapZ);
                    if (neighborId2 !== undefined) {
                        var neighbor = mapperData.rooms.get(neighborId2);
                        if (neighbor && neighbor.Exits) {
                            for (var dir in neighbor.Exits) {
                                if (neighbor.Exits[dir].RoomId === roomId) {
                                    breakExitLocally(neighborId2, dir);
                                }
                            }
                        }
                    }
                }
            }
        });
    });
}

function centerCamera() {

function setCameraTarget(tx, ty, tz) {
    panOffsetX = 0; panOffsetY = 0;
    if (typeof tz === 'undefined') tz = cameraZ;
    if (CENTER_EASE_DURATION <= 0) { cameraX = tx; cameraY = ty; cameraZ = tz; render(); return; }
    if (easeRafId !== null) { cancelAnimationFrame(easeRafId); easeRafId = null; }
    easeStartX = cameraX; easeStartY = cameraY; easeStartZ = cameraZ;
    easeTargetX = tx; easeTargetY = ty; easeTargetZ = tz;
    easeStartTime = null;
    function step(ts) {
        if (easeStartTime === null) easeStartTime = ts;
        var t = Math.min((ts - easeStartTime) / 1000 / CENTER_EASE_DURATION, 1);
        var s = smoothstep(t);
        cameraX = easeStartX + (easeTargetX - easeStartX) * s;
        cameraY = easeStartY + (easeTargetY - easeStartY) * s;
        cameraZ = easeStartZ + (easeTargetZ - easeStartZ) * s;
        render();
        easeRafId = t < 1 ? requestAnimationFrame(step) : null;
    }
    easeRafId = requestAnimationFrame(step);
}
