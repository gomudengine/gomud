{{define "header"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MUD Admin</title>
    <link rel="stylesheet" id="theme-stylesheet" href="/admin/static/css/theme-default.css">
    <link rel="stylesheet" href="/admin/static/css/highlight.css">
    <script>
    (function(){
        var c=document.cookie.split(';');
        for(var i=0;i<c.length;i++){
            var p=c[i].trim().split('=');
            if(p[0]==='gomud_admin_theme'&&p[1]){
                var id=decodeURIComponent(p[1]);
                var ok=['default','slate','ember','dusk','forest','crypt','bubblegum','arctic','toxic','parchment','synthwave'];
                if(ok.indexOf(id)>=0){
                    document.getElementById('theme-stylesheet').href='/admin/static/css/theme-'+id+'.css';
                }
            }
        }
    })();
    </script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; font-size: 1rem; line-height: 1.5; color: var(--color-text); background: var(--color-page-bg); }
        nav { background: var(--color-nav-bg); color: var(--color-nav-link); padding: 0.75rem 1.5rem; display: flex; align-items: center; gap: 1.5rem; }
        nav .brand { font-weight: 700; font-size: 1.1rem; color: var(--color-nav-link-hover); text-decoration: none; }
        nav a { color: var(--color-nav-link); text-decoration: none; font-size: 0.9rem; }
        nav a:hover { color: var(--color-nav-link-hover); }
        .nav-spacer { flex: 1; }
        .nav-clear-cache {
            background: none; border: 1px solid var(--color-text-tertiary); border-radius: 3px;
            color: var(--color-nav-link); font-size: 0.75rem; cursor: pointer;
            padding: 0.2rem 0.55rem; white-space: nowrap;
        }
        .nav-clear-cache:hover { border-color: var(--color-text-placeholder); color: var(--color-nav-link-hover); }
        .nav-clear-cache.done { border-color: var(--color-success-text); color: var(--color-success-text); }
        .nav-dropdown { position: relative; display: inline-block; }
        .nav-btn {
            background: none; border: none; color: var(--color-nav-link); font-size: 0.9rem;
            cursor: pointer; padding: 0;
        }
        .nav-btn:hover { color: var(--color-nav-link-hover); }
        .nav-dropdown-menu {
            display: none; position: absolute; top: 100%; left: 0;
            background: var(--color-nav-dropdown-bg); border: 1px solid var(--color-nav-border); border-radius: 4px;
            min-width: 140px; z-index: 100; padding: 0.25rem 0;
        }
        .nav-dropdown:hover .nav-dropdown-menu { display: block; }
        .nav-dropdown-menu a {
            display: block; padding: 0.4rem 0.85rem;
            color: var(--color-nav-link); font-size: 0.85rem; text-decoration: none; white-space: nowrap;
        }
        .nav-dropdown-menu a:hover { background: var(--color-nav-dropdown-hover); color: var(--color-nav-link-hover); }
        .nav-submenu { position: relative; }
        .nav-submenu-label {
            display: block; padding: 0.4rem 0.85rem;
            color: var(--color-nav-link); font-size: 0.85rem; cursor: default;
            white-space: nowrap;
        }
        .nav-submenu-label:hover { background: var(--color-nav-dropdown-hover); color: var(--color-nav-link-hover); }
        .nav-submenu-menu {
            display: none; position: absolute; left: 100%; top: 0;
            background: var(--color-nav-dropdown-bg); border: 1px solid var(--color-nav-border); border-radius: 4px;
            min-width: 140px; z-index: 101; padding: 0.25rem 0;
        }
        .nav-submenu:hover .nav-submenu-menu { display: block; }
        .nav-submenu-menu a {
            display: block; padding: 0.4rem 0.85rem;
            color: var(--color-nav-link); font-size: 0.85rem; text-decoration: none;
        }
        .nav-submenu-menu a:hover { background: var(--color-nav-dropdown-hover); color: var(--color-nav-link-hover); }
        main { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }

        /* Universal input base styles */
        input[type="text"],
        input[type="number"],
        input[type="search"],
        input[type="password"],
        input[type="email"],
        select,
        textarea {
            padding: 0.4rem 0.6rem;
            border: 1px solid var(--color-border-medium);
            border-radius: 4px;
            font-size: 0.875rem;
            font-family: inherit;
            background: var(--color-surface-white);
            color: var(--color-text);
        }
        input[type="text"]:focus,
        input[type="number"]:focus,
        input[type="search"]:focus,
        input[type="password"]:focus,
        input[type="email"]:focus,
        select:focus,
        textarea:focus {
            outline: 2px solid var(--color-primary);
            outline-offset: 1px;
            border-color: transparent;
        }
        textarea { resize: vertical; }

        .picker-display {
            padding: 0.4rem 0.6rem;
            border: 1px solid var(--color-border-medium);
            border-radius: 4px;
            font-size: 0.875rem;
            background: var(--color-surface-alt);
            min-height: 2rem;
            display: flex;
            align-items: center;
        }
        .picker-display.empty {
            color: var(--color-text-placeholder);
            font-style: italic;
        }
        .curl-block code.hljs { background: transparent; padding: 0; }
        .curl-block .hljs { color: var(--color-code-text); }
        .curl-block .hljs-attr { color: var(--color-api-str); }
        .curl-block .hljs-string { color: var(--color-code-link); }
        .curl-block .hljs-number { color: var(--color-code-symbol); }
        .curl-block .hljs-literal { color: var(--color-code-symbol); }
        .curl-block .hljs-punctuation { color: var(--color-code-text); }
        .yaml-badge {
            font-size: 0.68rem; padding: 0.15rem 0.45rem; border-radius: 3px;
            background: var(--color-chip-bg); color: var(--color-chip-text);
            border: 1px solid var(--color-border-medium); cursor: pointer;
            font-family: monospace; font-weight: 600; flex-shrink: 0;
            vertical-align: middle; line-height: 1;
        }
        .yaml-badge:hover { background: var(--color-row-hover); border-color: var(--color-primary); color: var(--color-primary); }
        #yaml-viewer-modal {
            display: none; position: fixed; inset: 0; z-index: 1000;
            background: rgba(0,0,0,0.55); align-items: center; justify-content: center;
        }
        #yaml-viewer-modal.open { display: flex; }
        .yaml-modal-box {
            background: var(--color-surface-white); border-radius: 8px;
            width: min(760px, 92vw); max-height: 84vh;
            display: flex; flex-direction: column;
            box-shadow: 0 8px 32px rgba(0,0,0,0.28);
        }
        .yaml-modal-header {
            display: flex; align-items: center; padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--color-border); gap: 0.5rem;
        }
        .yaml-modal-title { font-weight: 600; font-size: 0.95rem; flex: 1; font-family: monospace; }
        .yaml-modal-close {
            background: none; border: none; cursor: pointer; font-size: 1.3rem;
            color: var(--color-text-muted); line-height: 1; padding: 0 0.2rem;
        }
        .yaml-modal-close:hover { color: var(--color-text); }
        .yaml-modal-body { overflow: auto; padding: 1rem; flex: 1; }
        .yaml-modal-body pre { margin: 0; font-size: 0.82rem; line-height: 1.55; }
    </style>
    <script src="/admin/static/js/highlight.js?v={{fileMtime "static/js/highlight.js"}}"></script>
    <script src="/admin/static/js/api.js?v={{fileMtime "static/js/api.js"}}"></script>
    <script src="/admin/static/js/ansi-colors.js?v={{fileMtime "static/js/ansi-colors.js"}}"></script>
    <script src="/admin/static/js/select-dialog.js?v={{fileMtime "static/js/select-dialog.js"}}"></script>
    <script src="/admin/static/js/picker.js?v={{fileMtime "static/js/picker.js"}}"></script>
    <script src="/admin/static/js/picker-configs.js?v={{fileMtime "static/js/picker-configs.js"}}"></script>
    <script src="/admin/static/js/script-editor.js?v={{fileMtime "static/js/script-editor.js"}}"></script>
    <script src="/admin/static/js/script-wizard.js?v={{fileMtime "static/js/script-wizard.js"}}"></script>
    <script src="/admin/static/js/scripting-docs.js?v={{fileMtime "static/js/scripting-docs.js"}}"></script>
    <script src="/admin/static/js/ansitags.js?v={{fileMtime "static/js/ansitags.js"}}"></script>
    <script src="/admin/static/js/ansi-composer.js?v={{fileMtime "static/js/ansi-composer.js"}}"></script>
    <script src="/admin/static/js/dice-roll-helper.js?v={{fileMtime "static/js/dice-roll-helper.js"}}"></script>
    <script src="/admin/static/js/theme-switcher.js?v={{fileMtime "static/js/theme-switcher.js"}}"></script>
    <script>
    (function () {
        function formatResponseBlocks() {
            var blocks = document.querySelectorAll('.resp-body .curl-block');
            for (var i = 0; i < blocks.length; i++) {
                var el = blocks[i];
                var raw = el.textContent || el.innerText || '';
                var trimmed = raw.trim();
                try {
                    var parsed = JSON.parse(trimmed);
                    var pretty = JSON.stringify(parsed, null, 2);
                    var pre = document.createElement('pre');
                    pre.className = 'curl-block';
                    var code = document.createElement('code');
                    code.className = 'language-json';
                    code.textContent = pretty;
                    pre.appendChild(code);
                    el.parentNode.replaceChild(pre, el);
                    hljs.highlightElement(code);
                } catch (e) {
                    // Not valid JSON - leave as-is
                }
            }
        }
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', formatResponseBlocks);
        } else {
            formatResponseBlocks();
        }
    })();
    </script>
</head>
<body>
    <nav>
        <a class="brand" href="/admin/">MUD Admin</a>
        {{range .NAV}}
          {{if .Children}}
            <div class="nav-dropdown">
              <button class="nav-btn">{{.Name}} &#9660;</button>
              <div class="nav-dropdown-menu">
                {{template "navDropdownItems" .Children}}
              </div>
            </div>
          {{else}}
            <a href="{{.Target}}">{{.Name}}</a>
          {{end}}
        {{end}}
        <span class="nav-spacer"></span>
        <button class="nav-clear-cache" id="nav-clear-cache-btn" onclick="(function(){
            var n = AdminAPI.clearCache();
            var btn = document.getElementById('nav-clear-cache-btn');
            btn.textContent = 'Cache cleared (' + n + ')';
            btn.classList.add('done');
            setTimeout(function(){ btn.textContent = 'Clear API Cache'; btn.classList.remove('done'); }, 2500);
        })()" title="Clear cached API responses from this session">Clear API Cache</button>
    </nav>
    <div id="yaml-viewer-modal" onclick="if(event.target===this)closeYamlModal()">
        <div class="yaml-modal-box">
            <div class="yaml-modal-header">
                <span class="yaml-modal-title" id="yaml-modal-title"></span>
                <button class="yaml-modal-close" onclick="closeYamlModal()" title="Close">&times;</button>
            </div>
            <div id="yaml-modal-path" style="padding:0.35rem 1rem 0; font-size:0.75rem; font-family:monospace; color:var(--color-text-faint); border-bottom:1px solid var(--color-border-faint); padding-bottom:0.35rem; display:none"></div>
            <div class="yaml-modal-body">
                <pre><code id="yaml-modal-code" class="language-yaml"></code></pre>
            </div>
        </div>
    </div>
    <script>
    function showYamlModal(url, title) {
        var modal = document.getElementById('yaml-viewer-modal');
        var titleEl = document.getElementById('yaml-modal-title');
        var pathEl = document.getElementById('yaml-modal-path');
        var codeEl = document.getElementById('yaml-modal-code');
        titleEl.textContent = title || 'YAML';
        pathEl.style.display = 'none';
        pathEl.textContent = '';
        codeEl.textContent = 'Loading...';
        codeEl.removeAttribute('data-highlighted');
        modal.classList.add('open');
        AdminAPI.get(url).then(function(res) {
            var d = res.ok && res.data && res.data.data;
            var yaml = d && d.yaml;
            var path = d && d.path;
            codeEl.textContent = yaml || 'Error loading YAML.';
            if (yaml) { hljs.highlightElement(codeEl); }
            if (path) { pathEl.textContent = path; pathEl.style.display = ''; }
        });
    }
    function closeYamlModal() {
        document.getElementById('yaml-viewer-modal').classList.remove('open');
    }
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeYamlModal();
    });
    </script>
    <main>
{{if .READ_ONLY}}
    <div style="
        background: repeating-linear-gradient(
            -45deg,
            rgba(180,120,0,0.08),
            rgba(180,120,0,0.08) 10px,
            transparent 10px,
            transparent 20px
        );
        border: 2px solid #b47800;
        border-radius: 6px;
        padding: 0.6rem 1rem;
        margin-bottom: 1.25rem;
        display: flex;
        align-items: center;
        gap: 0.6rem;
        font-size: 0.9rem;
        color: #7a5000;
    ">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="flex-shrink:0">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
        <span><strong>Read-only</strong> &mdash; you do not have the <code>{{.WRITE_PERMISSION}}</code> permission. Changes are not allowed on this page.</span>
    </div>
{{end}}
{{end}}
