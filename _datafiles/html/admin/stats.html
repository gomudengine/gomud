{{template "header" .}}

<style>
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    .subtitle { color: #555; margin-bottom: 1.5rem; font-size: 0.9rem; }

    /* toolbar */
    .toolbar { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .btn { padding: 0.4rem 1rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.875rem; font-weight: 600; }
    .btn-primary { background: #1a1a2e; color: #fff; }
    .btn-primary:hover { background: #2d2d4e; }
    .btn-primary:disabled { background: #999; cursor: default; }
    .refresh-rate { display: flex; align-items: center; gap: 0.6rem; font-size: 0.82rem; color: #555; }
    .refresh-rate input[type="range"] { width: 120px; accent-color: #1a1a2e; cursor: pointer; }
    .refresh-rate-label { min-width: 2.5rem; font-size: 0.82rem; color: #1a1a2e; font-weight: 600; }
    .refresh-countdown { font-size: 0.78rem; color: #888; min-width: 9rem; }
    .last-updated { font-size: 0.78rem; color: #aaa; margin-left: auto; }

    /* status */
    .status-bar { display: none; padding: 0.5rem 0.85rem; border-radius: 4px; font-size: 0.85rem; margin-bottom: 1rem; }
    .status-bar.error { background: #fde8e8; color: #8a0000; display: block; }

    /* runtime card grid — for UnitCount metrics from the Go section */
    .runtime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 0.75rem; margin-bottom: 2rem; }
    .runtime-card { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 1rem 1.1rem; }
    .runtime-card .rc-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; color: #888; margin-bottom: 0.35rem; }
    .runtime-card .rc-value { font-size: 1.6rem; font-weight: 700; color: #1a1a2e; line-height: 1.1; }
    .runtime-card .rc-unit { font-size: 0.72rem; color: #aaa; margin-top: 0.2rem; }

    /* section blocks */
    .sections { display: flex; flex-direction: column; gap: 1.5rem; }
    .section-block { background: #fff; border: 1px solid #ddd; border-radius: 6px; overflow: hidden; }
    .section-head {
        display: flex; align-items: baseline; gap: 0.75rem;
        padding: 0.65rem 1rem; background: #1a1a2e; color: #fff;
    }
    .section-head .sec-name { font-size: 0.9rem; font-weight: 700; }
    .section-head .sec-total { font-size: 0.8rem; color: #8899cc; margin-left: auto; }

    /* metrics table */
    .metrics-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    .metrics-table th {
        background: #f0f0f0; padding: 0.45rem 0.9rem; text-align: left;
        font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.04em;
        font-weight: 600; color: #555; border-bottom: 1px solid #ddd;
    }
    .metrics-table td { padding: 0.5rem 0.9rem; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
    .metrics-table tr:last-child td { border-bottom: none; }
    .metrics-table tr:hover td { background: #f5f7ff; }

    .metric-name { font-family: monospace; color: #1a1a2e; }
    .metric-size { font-family: monospace; font-weight: 600; color: #1a1a2e; white-space: nowrap; }
    .metric-count { font-size: 0.8rem; color: #888; white-space: nowrap; }

    /* bar column */
    .bar-cell { width: 200px; min-width: 120px; }
    .bar-track { background: #eee; border-radius: 3px; height: 8px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; background: #4a6fa5; transition: width 0.35s ease; }
    .bar-fill.bar-large { background: #c0392b; }
    .bar-fill.bar-medium { background: #e67e22; }

    /* tooltip */
    .has-tip { cursor: help; border-bottom: 1px dashed #aaa; display: inline; }
    .tip {
        display: none; position: absolute; z-index: 200;
        background: #1a1a2e; color: #e0e0e0;
        font-size: 0.78rem; font-family: system-ui, sans-serif; font-weight: 400;
        line-height: 1.45; max-width: 280px;
        padding: 0.5rem 0.75rem; border-radius: 5px;
        box-shadow: 0 3px 10px rgba(0,0,0,0.35);
        pointer-events: none; white-space: normal;
    }
    .tip::after {
        content: ''; position: absolute; top: 100%; left: 14px;
        border: 5px solid transparent; border-top-color: #1a1a2e;
    }

    /* loading skeleton */
    .skeleton-row td { padding: 0.55rem 0.9rem; }
    .skel { background: #eee; border-radius: 3px; height: 14px; animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
</style>

<h1>Server Stats</h1>
<p class="subtitle">Live memory usage across all registered subsystems. Byte values are approximate.</p>

<div class="toolbar">
    <button class="btn btn-primary" id="refresh-btn" onclick="loadStats()">Refresh</button>
    <span class="refresh-rate">
        <span>Refresh every</span>
        <input type="range" id="refresh-slider" min="0" max="60" value="4"
               oninput="onSliderInput()" />
        <span class="refresh-rate-label" id="refresh-rate-label">4s</span>
        <span class="refresh-countdown" id="refresh-countdown"></span>
    </span>
    <span class="last-updated" id="last-updated"></span>
</div>

<div id="status-bar" class="status-bar"></div>

<div id="runtime-grid" class="runtime-grid"></div>
<div id="sections" class="sections"></div>

<script>
(function () {
    'use strict';

    // -------------------------------------------------------------------------
    // Tooltip definitions for Go runtime metrics
    // -------------------------------------------------------------------------
    const GO_TIPS = {
        'HeapAlloc (!Freed)':   'Bytes of heap objects currently allocated and not yet freed by the garbage collector. This is the most useful live memory figure — it shows how much your application is actively using right now.',
        'HeapSys (!Reclaimed)': 'Total bytes of heap memory obtained from the OS. Includes memory the GC has freed internally but not yet returned to the OS. Will always be >= HeapAlloc.',
        'StackSys (Reserved)':  'Total bytes of memory reserved by the OS for goroutine stacks. Each goroutine starts with a small stack that grows as needed.',
        'StackInuse (In Use)':  'Bytes of stack memory currently in use across all goroutines. A subset of StackSys.',
        'Sys (Everything)':     'Total bytes of memory obtained from the OS across all categories: heap, stacks, internal runtime structures, and GC metadata. The broadest view of process memory.',
        'GC Count':             'Total number of completed garbage collection cycles since the process started. Frequent GC can indicate high allocation pressure.',
        'Maximum Processors':   'The value of GOMAXPROCS — the maximum number of OS threads that can execute Go code simultaneously. Typically equals the number of logical CPU cores.',
        'Goroutines Count':     'Number of goroutines currently running or waiting. A steadily growing count may indicate a goroutine leak.',
    };

    // -------------------------------------------------------------------------
    // Tooltip DOM — single floating element reused for all tips
    // -------------------------------------------------------------------------
    const tipEl = document.createElement('div');
    tipEl.className = 'tip';
    tipEl.id = 'go-tip';
    document.body.appendChild(tipEl);

    function showTip(anchor, text) {
        tipEl.textContent = text;
        tipEl.style.display = 'block';
        const r = anchor.getBoundingClientRect();
        const scrollY = window.scrollY || document.documentElement.scrollTop;
        const scrollX = window.scrollX || document.documentElement.scrollLeft;
        let left = r.left + scrollX;
        const top  = r.bottom + scrollY + 6;
        // Keep within viewport horizontally
        const tipW = tipEl.offsetWidth;
        if (left + tipW > window.innerWidth + scrollX - 8) {
            left = window.innerWidth + scrollX - tipW - 8;
        }
        tipEl.style.left = left + 'px';
        tipEl.style.top  = top  + 'px';
    }

    function hideTip() {
        tipEl.style.display = 'none';
    }

    // Wrap a metric name in a tooltip span if a tip exists for it.
    // Returns plain escaped text when no tip is defined.
    function metricNameHtml(metric, sectionName) {
        const tip = sectionName === 'Go' ? GO_TIPS[metric] : null;
        if (!tip) return esc(metric);
        return '<span class="has-tip" data-tip="' + esc(tip) + '">' + esc(metric) + '</span>';
    }

    // -------------------------------------------------------------------------
    // Formatting helpers
    // -------------------------------------------------------------------------
    function fmtBytes(n) {
        if (n === 0) return '0 B';
        const units = ['B','KB','MB','GB','TB'];
        const i = Math.min(Math.floor(Math.log2(n) / 10), units.length - 1);
        const v = n / Math.pow(1024, i);
        return (i === 0 ? v.toFixed(0) : v.toFixed(1)) + ' ' + units[i];
    }

    function fmtCount(n) {
        return n.toLocaleString();
    }

    // Strip noise suffixes like " (!Freed)", " (Reserved)" etc. for display
    function cleanLabel(s) {
        return s.replace(/\s*\([^)]*\)\s*$/, '').trim();
    }

    // -------------------------------------------------------------------------
    // Render runtime cards (UnitCount metrics from any section)
    // -------------------------------------------------------------------------
    function renderRuntimeCards(sections) {
        const grid = document.getElementById('runtime-grid');
        grid.innerHTML = '';

        // Collect all UnitCount entries across all sections, Go section first
        const order = ['Go', ...Object.keys(sections).filter(k => k !== 'Go')];
        for (const name of order) {
            const section = sections[name];
            if (!section) continue;
            for (const [metric, entry] of Object.entries(section)) {
                if (entry.unit !== 'count') continue;
                const card = document.createElement('div');
                card.className = 'runtime-card';
                const tip = name === 'Go' ? GO_TIPS[metric] : null;
                const labelHtml = tip
                    ? '<span class="has-tip" data-tip="' + esc(tip) + '">' + esc(cleanLabel(metric)) + '</span>'
                    : esc(cleanLabel(metric));
                card.innerHTML =
                    '<div class="rc-label">' + labelHtml + '</div>' +
                    '<div class="rc-value">' + fmtCount(entry.memory) + '</div>' +
                    '<div class="rc-unit">' + esc(name) + '</div>';
                grid.appendChild(card);
            }
        }
    }

    // -------------------------------------------------------------------------
    // Render per-section byte tables
    // -------------------------------------------------------------------------
    function renderSections(sections) {
        const container = document.getElementById('sections');
        container.innerHTML = '';

        // Go section first, then alphabetical
        const order = ['Go', ...Object.keys(sections).filter(k => k !== 'Go').sort()];

        for (const name of order) {
            const section = sections[name];
            if (!section) continue;

            // Filter to byte metrics only
            const byteEntries = Object.entries(section)
                .filter(([, e]) => e.unit === 'bytes')
                .sort((a, b) => b[1].memory - a[1].memory); // largest first

            if (byteEntries.length === 0) continue;

            const sectionTotal = byteEntries.reduce((s, [, e]) => s + e.memory, 0);
            const maxVal = byteEntries[0][1].memory; // already sorted desc

            const block = document.createElement('div');
            block.className = 'section-block';

            // Header
            const head = document.createElement('div');
            head.className = 'section-head';
            head.innerHTML =
                '<span class="sec-name">' + esc(name) + '</span>' +
                '<span class="sec-total">' + fmtBytes(sectionTotal) + ' total</span>';
            block.appendChild(head);

            // Table
            const table = document.createElement('table');
            table.className = 'metrics-table';
            table.innerHTML =
                '<thead><tr>' +
                '<th>Metric</th>' +
                '<th>Size</th>' +
                '<th>Items</th>' +
                '<th class="bar-cell">Relative size</th>' +
                '</tr></thead>';

            const tbody = document.createElement('tbody');
            for (const [metric, entry] of byteEntries) {
                const pct = maxVal > 0 ? (entry.memory / maxVal) * 100 : 0;
                const barClass = pct > 75 ? 'bar-large' : pct > 40 ? 'bar-medium' : '';

                const tr = document.createElement('tr');
                tr.innerHTML =
                    '<td class="metric-name">' + metricNameHtml(metric, name) + '</td>' +
                    '<td class="metric-size">' + fmtBytes(entry.memory) + '</td>' +
                    '<td class="metric-count">' + (entry.count > 0 ? fmtCount(entry.count) : '—') + '</td>' +
                    '<td class="bar-cell"><div class="bar-track">' +
                        '<div class="bar-fill ' + barClass + '" style="width:' + pct.toFixed(1) + '%"></div>' +
                    '</div></td>';
                tbody.appendChild(tr);
            }

            table.appendChild(tbody);
            block.appendChild(table);
            container.appendChild(block);
        }
    }

    // -------------------------------------------------------------------------
    // Skeleton loader
    // -------------------------------------------------------------------------
    function showSkeleton() {
        const container = document.getElementById('sections');
        container.innerHTML = '';
        for (let s = 0; s < 3; s++) {
            const block = document.createElement('div');
            block.className = 'section-block';
            block.innerHTML = '<div class="section-head"><span class="sec-name" style="background:#2d2d4e;color:#2d2d4e;border-radius:3px;">Loading section</span></div>';
            const table = document.createElement('table');
            table.className = 'metrics-table';
            table.innerHTML = '<thead><tr><th>Metric</th><th>Size</th><th>Items</th><th class="bar-cell">Relative size</th></tr></thead>';
            const tbody = document.createElement('tbody');
            for (let r = 0; r < 4; r++) {
                tbody.innerHTML += '<tr class="skeleton-row">' +
                    '<td><div class="skel" style="width:' + (60 + r * 15) + 'px"></div></td>' +
                    '<td><div class="skel" style="width:55px"></div></td>' +
                    '<td><div class="skel" style="width:35px"></div></td>' +
                    '<td><div class="bar-track"><div class="skel" style="width:' + (30 + r * 12) + '%;height:8px;border-radius:3px"></div></div></td>' +
                    '</tr>';
            }
            table.appendChild(tbody);
            block.appendChild(table);
            container.appendChild(block);
        }
    }

    // -------------------------------------------------------------------------
    // Load
    // -------------------------------------------------------------------------
    // Fetches stats, bypassing the AdminAPI cache so scheduled refreshes always
    // get fresh data.
    async function fetchStats() {
        return AdminAPI.get('/admin/api/v1/stats/memory', true);
    }

    async function applyStats(res) {
        if (!res.ok) {
            showStatus('Failed to load stats: ' + (res.error || 'unknown error'));
            return;
        }
        const sections = (res.data && res.data.data) || {};
        renderRuntimeCards(sections);
        renderSections(sections);
        document.getElementById('last-updated').textContent =
            'Last updated: ' + new Date().toLocaleTimeString();
    }

    // Manual refresh — also resets the countdown.
    window.loadStats = async function () {
        const btn = document.getElementById('refresh-btn');
        btn.disabled = true;
        btn.textContent = 'Loading...';

        const res = await fetchStats();

        btn.disabled = false;
        btn.textContent = 'Refresh';

        await applyStats(res);
        resetCountdown();
    };

    // -------------------------------------------------------------------------
    // Auto-refresh — single 1-second ticker drives both the countdown display
    // and the actual data fetch.  No setInterval for the fetch itself.
    // -------------------------------------------------------------------------
    let tickTimer    = null;   // 1-second interval
    let secondsLeft  = 0;      // counts down to next fetch
    let intervalSecs = 4;      // current slider value

    const countdownEl   = document.getElementById('refresh-countdown');
    const rateLabelEl   = document.getElementById('refresh-rate-label');
    const sliderEl      = document.getElementById('refresh-slider');

    function updateCountdownDisplay() {
        if (intervalSecs === 0) {
            countdownEl.textContent = '';
        } else {
            countdownEl.textContent = 'Refreshing in ' + secondsLeft + 's';
        }
    }

    function resetCountdown() {
        secondsLeft = intervalSecs;
        updateCountdownDisplay();
    }

    function startTicker() {
        clearInterval(tickTimer);
        if (intervalSecs === 0) {
            countdownEl.textContent = '';
            return;
        }
        resetCountdown();
        tickTimer = setInterval(async function () {
            secondsLeft -= 1;
            if (secondsLeft <= 0) {
                // Fetch fresh data, then reset the countdown.
                const res = await fetchStats();
                await applyStats(res);
                secondsLeft = intervalSecs;
            }
            updateCountdownDisplay();
        }, 1000);
    }

    window.onSliderInput = function () {
        intervalSecs = parseInt(sliderEl.value, 10);
        rateLabelEl.textContent = intervalSecs === 0 ? 'Off' : intervalSecs + 's';
        startTicker();
    };

    // -------------------------------------------------------------------------
    // Status
    // -------------------------------------------------------------------------
    function showStatus(msg) {
        const bar = document.getElementById('status-bar');
        bar.textContent = msg;
        bar.className = 'status-bar error';
    }

    function esc(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // -------------------------------------------------------------------------
    // Tooltip event delegation
    // -------------------------------------------------------------------------
    document.addEventListener('mouseover', function (e) {
        const el = e.target.closest('.has-tip');
        if (el) showTip(el, el.dataset.tip);
    });
    document.addEventListener('mouseout', function (e) {
        if (e.target.closest('.has-tip')) hideTip();
    });

    // -------------------------------------------------------------------------
    // Boot
    // -------------------------------------------------------------------------
    showSkeleton();
    loadStats();
    startTicker();
})();
</script>

{{template "footer" .}}
