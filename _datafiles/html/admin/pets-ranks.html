{{template "header" .}}

<style>
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    .subtitle { color: var(--color-text-muted); margin-bottom: 1.5rem; font-size: 0.9rem; }
    .subtitle a { color: var(--color-primary); }

    /* toolbar */
    .toolbar { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .btn { padding: 0.4rem 1rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.875rem; font-weight: 600; }
    .btn-primary { background: var(--color-primary); color: var(--color-surface-white); }
    .btn-primary:hover { background: var(--color-primary-hover); }
    .btn-primary:disabled { background: var(--color-text-secondary); cursor: default; }
    .last-updated { font-size: 0.78rem; color: var(--color-text-placeholder); margin-left: auto; }

    /* status */
    .status-bar { display: none; padding: 0.5rem 0.85rem; border-radius: 4px; font-size: 0.85rem; margin-bottom: 1rem; }
    .status-bar.error { background: var(--color-error-bg); color: var(--color-error-text); display: block; }

    /* view tabs */
    .view-tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border: 1px solid var(--color-border); border-radius: 6px; overflow: hidden; }
    .view-tab {
        flex: 1; padding: 0.55rem 0.5rem; border: none; background: var(--color-page-bg);
        cursor: pointer; font-size: 0.82rem; font-weight: 600; color: var(--color-text-muted);
        border-right: 1px solid var(--color-border); transition: background 0.1s, color 0.1s;
        text-align: center; line-height: 1.3;
    }
    .view-tab:last-child { border-right: none; }
    .view-tab:hover { background: var(--color-border-strong); color: var(--color-primary); }
    .view-tab.active { background: var(--color-primary); color: var(--color-surface-white); }
    .view-tab .tab-title { display: block; }
    .view-tab .tab-hint { display: block; font-size: 0.72rem; font-weight: 400; opacity: 0.75; margin-top: 0.1rem; }

    /* filter bar */
    .filter-bar { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .filter-bar label { font-size: 0.82rem; color: var(--color-text-muted); white-space: nowrap; }
    .filter-bar select, .filter-bar input[type="text"] {
        padding: 0.3rem 0.6rem; border: 1px solid var(--color-border-medium); border-radius: 4px;
        font-size: 0.82rem; background: var(--color-surface-white);
    }
    .filter-bar select:focus, .filter-bar input[type="text"]:focus { outline: 2px solid var(--color-primary); }

    /* rank table */
    .rank-table-wrap { background: var(--color-surface-white); border: 1px solid var(--color-border); border-radius: 6px; overflow: hidden; }
    .rank-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    .rank-table th {
        background: var(--color-primary); color: var(--color-code-text);
        padding: 0.5rem 0.85rem; text-align: left;
        font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em;
        font-weight: 600; white-space: nowrap;
    }
    .rank-table th.sortable { cursor: pointer; user-select: none; }
    .rank-table th.sortable:hover { color: var(--color-surface-white); }
    .rank-table th .sort-arrow { margin-left: 0.3rem; font-size: 0.65rem; opacity: 0.5; }
    .rank-table th.sorted-asc .sort-arrow::after  { content: " ▲"; opacity: 1; }
    .rank-table th.sorted-desc .sort-arrow::after { content: " ▼"; opacity: 1; }
    .rank-table th:not(.sorted-asc):not(.sorted-desc) .sort-arrow::after { content: " ⇅"; }
    .rank-table td { padding: 0.5rem 0.85rem; border-bottom: 1px solid var(--color-border-faint); vertical-align: middle; }
    .rank-table tr:last-child td { border-bottom: none; }
    .rank-table tr:hover td { background: var(--color-row-hover); }

    /* pet name + link */
    .pet-name { font-weight: 600; color: var(--color-primary); }
    .pet-name a { color: inherit; text-decoration: none; }
    .pet-name a:hover { text-decoration: underline; }

    /* score bar */
    .score-cell { white-space: nowrap; display: flex; align-items: center; gap: 0.5rem; }
    .score-cell[data-row-tip] { cursor: help; }
    .score-val { font-family: monospace; font-weight: 700; color: var(--color-primary); flex: 1; }
    .score-bar-track { display: inline-block; vertical-align: middle; width: 80px; height: 8px; background: var(--color-border-light); border-radius: 3px; overflow: hidden; flex-shrink: 0; margin-left: auto; }
    .score-bar-fill  { display: block; height: 8px; border-radius: 3px; background: var(--color-accent-link); transition: width 0.3s ease; }
    .score-bar-fill.top { background: var(--color-danger); }

    /* dice cell */
    .dice-roll { font-family: monospace; font-size: 0.82rem; color: var(--color-text-muted); }

    /* level sparkline */
    .spark-cell { display: flex; align-items: center; gap: 0.5rem; }
    .spark-cell .spark-peak { font-family: monospace; font-weight: 700; font-size: 0.82rem; color: var(--color-primary); white-space: nowrap; }
    .spark-cell .spark-peak.zero { color: var(--color-text-placeholder); }
    .spark-wrap { display: flex; align-items: flex-end; gap: 1px; height: 20px; }
    .spark-bar { width: 6px; border-radius: 1px 1px 0 0; min-height: 1px; transition: height 0.2s; cursor: default; }
    .spark-bar.zero { background: var(--color-border-light); }
    .spark-bar.c-dps { background: var(--color-accent-link); }
    .spark-bar.c-stat { background: var(--color-success-text); }
    .spark-bar.c-buff { background: var(--color-info-text); }
    .spark-bar.c-cap { background: var(--color-warning-text); }

    /* combat chance badge */
    .cc-badge {
        display: inline-block; padding: 0.1rem 0.4rem; border-radius: 3px;
        font-size: 0.7rem; font-weight: 700; font-family: monospace;
    }
    .cc-high { background: var(--color-success-bg); color: var(--color-success-text); }
    .cc-mid  { background: var(--color-warning-bg); color: var(--color-warning-text); }
    .cc-low  { background: var(--color-error-bg); color: var(--color-error-text); }
    .cc-none { background: var(--color-page-bg); color: var(--color-text-placeholder); }

    /* loading skeleton */
    .skeleton-row td { padding: 0.55rem 0.85rem; }
    .skel { background: var(--color-border-light); border-radius: 3px; height: 14px; animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* empty state */
    .empty-state { padding: 3rem; text-align: center; color: var(--color-text-placeholder); font-size: 0.9rem; }

    /* tooltip */
    .tip {
        display: none; position: fixed; z-index: 200;
        background: var(--color-primary); color: var(--color-border-strong);
        font-size: 0.78rem; font-family: system-ui, sans-serif; font-weight: 400;
        text-transform: none; letter-spacing: normal;
        line-height: 1.5; max-width: 280px;
        padding: 0.5rem 0.75rem; border-radius: 5px;
        box-shadow: 0 3px 10px var(--color-shadow);
        pointer-events: none; white-space: normal;
    }

    /* detail panel */
    .detail-panel {
        display: none; margin-top: 1.5rem;
        background: var(--color-surface-white); border: 1px solid var(--color-border); border-radius: 6px;
        padding: 1.25rem; animation: slideIn 0.15s ease;
    }
    .detail-panel.open { display: block; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
    .detail-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .detail-header h2 { font-size: 1.1rem; margin: 0; }
    .detail-close { background: none; border: none; cursor: pointer; font-size: 1.2rem; color: var(--color-text-placeholder); padding: 0 0.3rem; }
    .detail-close:hover { color: var(--color-danger); }
    .level-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.75rem; }
    .level-card {
        border: 1px solid var(--color-border-light); border-radius: 6px; padding: 0.65rem 0.75rem;
        background: var(--color-page-bg); font-size: 0.82rem;
    }
    .level-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.4rem; }
    .level-card-header strong { font-size: 0.85rem; }
    .level-card-header .cc-badge { font-size: 0.65rem; }
    .level-stat { display: flex; justify-content: space-between; padding: 0.1rem 0; font-size: 0.78rem; color: var(--color-text-muted); }
    .level-stat .val { font-weight: 600; color: var(--color-primary); font-family: monospace; }
    .level-stat .val.zero { color: var(--color-text-placeholder); }
    .level-buffs { margin-top: 0.3rem; display: flex; flex-wrap: wrap; gap: 0.25rem; }
    .level-buff-chip {
        display: inline-block; padding: 0.1rem 0.4rem; border-radius: 3px;
        font-size: 0.7rem; background: var(--color-chip-bg); color: var(--color-chip-text);
    }
</style>

<h1>Pet Rankings</h1>
<p class="subtitle">
    Computed rankings for all pet types across levels 1&ndash;10.
    Scores combine damage, combat chance, stat mods, buffs, and capacity.
</p>

<div id="statusBar" class="status-bar"></div>

<div class="toolbar">
    <button class="btn btn-primary" onclick="loadRankings()">Refresh</button>
    <span id="lastUpdated" class="last-updated"></span>
</div>

<div class="view-tabs">
    <button class="view-tab active" id="tab-combat" onclick="switchView('combat')">
        <span class="tab-title">Combat</span>
        <span class="tab-hint">DPS &times; combat chance</span>
    </button>
    <button class="view-tab" id="tab-utility" onclick="switchView('utility')">
        <span class="tab-title">Utility</span>
        <span class="tab-hint">Stats + buffs + capacity</span>
    </button>
    <button class="view-tab" id="tab-overall" onclick="switchView('overall')">
        <span class="tab-title">Overall</span>
        <span class="tab-hint">Combined score</span>
    </button>
</div>

<div class="filter-bar">
    <label for="filterSearch">Search:</label>
    <input type="text" id="filterSearch" placeholder="pet name…" oninput="renderTable()">
</div>

<div class="rank-table-wrap">
    <table class="rank-table" id="rankTable">
        <thead>
            <tr>
                <th class="sortable" data-key="Type" onclick="sortBy('Type')" data-tip="The pet's type identifier. Click the name to open it in the pet editor.">Type<span class="sort-arrow"></span></th>
                <th class="sortable" data-key="PeakDPS" onclick="sortBy('PeakDPS')" data-tip="Effective DPS at each level (avgDmg × combatChance%). Bar graph shows progression across levels 1-10. Number is the peak.">DPS<span class="sort-arrow"></span></th>
                <th class="sortable" data-key="PeakMaxDmg" onclick="sortBy('PeakMaxDmg')" data-tip="Theoretical maximum single-hit damage at the pet's strongest level.">Peak Hit<span class="sort-arrow"></span></th>
                <th class="sortable" data-key="PeakStatTotal" onclick="sortBy('PeakStatTotal')" data-tip="Sum of absolute stat modifier values at each level. Bar graph shows progression across levels 1-10. Number is the peak.">Stats<span class="sort-arrow"></span></th>
                <th class="sortable" data-key="PeakBuffCount" onclick="sortBy('PeakBuffCount')" data-tip="Number of permanent buffs at each level. Bar graph shows progression across levels 1-10. Number is the peak count.">Buffs<span class="sort-arrow"></span></th>
                <th class="sortable" data-key="PeakCapacity" onclick="sortBy('PeakCapacity')" data-tip="Carry capacity at each level. Bar graph shows progression across levels 1-10. Number is the peak.">Capacity<span class="sort-arrow"></span></th>
                <th class="sortable" id="scoreHeader" data-key="CombatScore" onclick="sortBy('CombatScore')" data-tip=""><span id="scoreLabel">Score</span><span class="sort-arrow"></span></th>
            </tr>
        </thead>
        <tbody id="rankBody">
            <tr class="skeleton-row"><td><div class="skel" style="width:80px"></div></td><td><div class="skel" style="width:100px"></div></td><td><div class="skel" style="width:50px"></div></td><td><div class="skel" style="width:100px"></div></td><td><div class="skel" style="width:100px"></div></td><td><div class="skel" style="width:100px"></div></td><td><div class="skel" style="width:100px"></div></td></tr>
            <tr class="skeleton-row"><td><div class="skel" style="width:70px"></div></td><td><div class="skel" style="width:100px"></div></td><td><div class="skel" style="width:50px"></div></td><td><div class="skel" style="width:100px"></div></td><td><div class="skel" style="width:100px"></div></td><td><div class="skel" style="width:100px"></div></td><td><div class="skel" style="width:100px"></div></td></tr>
            <tr class="skeleton-row"><td><div class="skel" style="width:90px"></div></td><td><div class="skel" style="width:100px"></div></td><td><div class="skel" style="width:50px"></div></td><td><div class="skel" style="width:100px"></div></td><td><div class="skel" style="width:100px"></div></td><td><div class="skel" style="width:100px"></div></td><td><div class="skel" style="width:100px"></div></td></tr>
        </tbody>
    </table>
</div>

<div id="detailPanel" class="detail-panel">
    <div class="detail-header">
        <h2 id="detailTitle">Level Breakdown</h2>
        <button class="detail-close" onclick="closeDetail()" title="Close">&times;</button>
    </div>
    <div id="detailContent" class="level-grid"></div>
</div>

<div id="tooltip" class="tip"></div>

<script>
(function() {
    var allData   = { by_combat: [], by_utility: [], by_overall: [] };
    var view      = 'combat';
    var sortKey   = null;
    var sortAsc   = true;

    window.loadRankings  = loadRankings;
    window.switchView    = switchView;
    window.renderTable   = renderTable;
    window.sortBy        = sortBy;
    window.showDetail    = showDetail;
    window.closeDetail   = closeDetail;

    loadRankings();

    async function loadRankings() {
        var result = await AdminAPI.get('/admin/api/v1/pets/ranks', true);
        if (!result.ok || !result.data || !result.data.success) {
            showError((result.data && result.data.error) || result.error || 'Unknown error');
            return;
        }
        allData = result.data.data;
        sortKey = null;
        renderTable();
        document.getElementById('lastUpdated').textContent =
            'Updated ' + new Date().toLocaleTimeString();
        hideError();
    }

    function switchView(v) {
        view = v;
        sortKey = null;
        ['combat','utility','overall'].forEach(function(id) {
            document.getElementById('tab-' + id).classList.toggle('active', id === v);
        });
        var header = document.getElementById('scoreHeader');
        var keyMap = { combat: 'CombatScore', utility: 'UtilityScore', overall: 'OverallScore' };
        header.dataset.key = keyMap[v];
        header.onclick = function() { sortBy(keyMap[v]); };
        var labelMap = { combat: 'Combat', utility: 'Utility', overall: 'Overall' };
        document.getElementById('scoreLabel').textContent = labelMap[v];
        var tipMap = {
            combat:  'Level-weighted combat score: at each level, DPS (avgDmg × combatChance%) is multiplied by a level weight (higher levels matter more), then averaged. Pure fighters score highest.',
            utility: 'Level-weighted utility score: at each level, total stat modifier magnitude + half buff value + 2× capacity is weighted by level, then averaged. Support pets score highest.',
            overall: 'Combined score: 3× combat + 1× utility. A balanced measure that favors combat contribution but rewards utility as a tiebreaker.'
        };
        header.dataset.tip = tipMap[v];
        renderTable();
    }

    function sortBy(key) {
        if (sortKey === key) {
            sortAsc = !sortAsc;
        } else {
            sortKey = key;
            sortAsc = (key === 'Type' || key === 'Name');
        }
        renderTable();
    }

    function renderTable() {
        var rows = currentRows();
        rows = applyFilters(rows);
        if (sortKey) rows = applySort(rows, sortKey, sortAsc);

        updateSortHeaders();

        var scoreKey = { combat: 'CombatScore', utility: 'UtilityScore', overall: 'OverallScore' }[view];
        var maxScore = 0;
        rows.forEach(function(r) { if (r[scoreKey] > maxScore) maxScore = r[scoreKey]; });

        // Compute per-column maximums across all visible rows for sparkline scaling
        var maxDPS = 0, maxStat = 0, maxBuff = 0, maxCap = 0;
        rows.forEach(function(r) {
            if (r.PeakDPS > maxDPS) maxDPS = r.PeakDPS;
            if (r.PeakStatTotal > maxStat) maxStat = r.PeakStatTotal;
            if (r.PeakBuffCount > maxBuff) maxBuff = r.PeakBuffCount;
            if (r.PeakCapacity > maxCap) maxCap = r.PeakCapacity;
        });

        var tbody = document.getElementById('rankBody');
        if (rows.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No pets match the current filters.</td></tr>';
            return;
        }

        tbody.innerHTML = rows.map(function(r) {
            var score    = r[scoreKey];
            var scoreFmt = score.toFixed(3);
            var pct      = maxScore > 0 ? Math.max(0, score / maxScore * 100).toFixed(1) : 0;
            var isTop    = pct > 85;

            var dpsSpark = buildSparkCell(r.Levels, maxDPS, 'c-dps',
                function(s) { return s.DPS || 0; },
                function(s, i) {
                    var t = 'Lv' + (i+1) + ': ' + (s.DPS || 0).toFixed(2) + ' DPS';
                    if (s.DiceRoll) t += ' (' + s.DiceRoll + ')';
                    if (s.CombatChance) t += ' @ ' + s.CombatChance + '%';
                    return t;
                },
                r.PeakDPS > 0 ? r.PeakDPS.toFixed(2) : null);

            var statSpark = buildSparkCell(r.Levels, maxStat, 'c-stat',
                function(s) { return s.StatTotal || 0; },
                function(s, i) {
                    var t = 'Lv' + (i+1) + ': ' + (s.StatTotal || 0) + ' total stats';
                    var mods = s.StatMods || {};
                    var keys = Object.keys(mods).sort();
                    if (keys.length) t += ' (' + keys.map(function(k) { return k + ' ' + (mods[k] > 0 ? '+' : '') + mods[k]; }).join(', ') + ')';
                    return t;
                },
                r.PeakStatTotal > 0 ? r.PeakStatTotal : null);

            var buffSpark = buildSparkCell(r.Levels, maxBuff, 'c-buff',
                function(s) { return s.BuffCount || 0; },
                function(s, i) {
                    var t = 'Lv' + (i+1) + ': ' + (s.BuffCount || 0) + ' buff' + ((s.BuffCount || 0) !== 1 ? 's' : '');
                    if (s.BuffNames && s.BuffNames.length) t += ' (' + s.BuffNames.join(', ') + ')';
                    return t;
                },
                r.PeakBuffCount > 0 ? r.PeakBuffCount : null);

            var capSpark = buildSparkCell(r.Levels, maxCap, 'c-cap',
                function(s) { return s.Capacity || 0; },
                function(s, i) { return 'Lv' + (i+1) + ': ' + (s.Capacity || 0) + ' capacity'; },
                r.PeakCapacity > 0 ? r.PeakCapacity : null);

            return '<tr onclick="showDetail(\'' + escAttr(r.Type) + '\')" style="cursor:pointer">' +
                '<td class="pet-name"><a href="/admin/pets#' + encodeURIComponent(r.Type) + '" onclick="event.stopPropagation()">' + escHtml(r.Type) + '</a></td>' +
                '<td>' + dpsSpark + '</td>' +
                '<td>' + (r.PeakMaxDmg > 0 ? r.PeakMaxDmg : '<span style="color:var(--color-text-placeholder)">&mdash;</span>') + '</td>' +
                '<td>' + statSpark + '</td>' +
                '<td>' + buffSpark + '</td>' +
                '<td>' + capSpark + '</td>' +
                '<td class="score-cell">' +
                    '<span class="score-val">' + scoreFmt + '</span>' +
                    '<span class="score-bar-track"><span class="score-bar-fill' + (isTop ? ' top' : '') + '" style="width:' + pct + '%"></span></span>' +
                '</td>' +
            '</tr>';
        }).join('');
    }

    function buildSparkCell(levels, maxVal, colorCls, valueFn, tipFn, peakDisplay) {
        if (!levels || levels.length === 0) return '<span style="color:var(--color-text-placeholder)">&mdash;</span>';
        var html = '<div class="spark-cell">';
        html += '<div class="spark-wrap">';
        for (var i = 0; i < levels.length; i++) {
            var v = valueFn(levels[i]);
            var h = maxVal > 0 ? Math.max(1, Math.round(v / maxVal * 20)) : 1;
            var cls = v > 0 ? 'spark-bar ' + colorCls : 'spark-bar zero';
            html += '<div class="' + cls + '" style="height:' + h + 'px" data-spark-tip="' + escAttr(tipFn(levels[i], i)) + '"></div>';
        }
        html += '</div>';
        if (peakDisplay != null) {
            html += '<span class="spark-peak">' + peakDisplay + '</span>';
        } else {
            html += '<span class="spark-peak zero">&mdash;</span>';
        }
        html += '</div>';
        return html;
    }

    function showDetail(petType) {
        var rows = currentRows();
        var pet = null;
        for (var i = 0; i < rows.length; i++) {
            if (rows[i].Type === petType) { pet = rows[i]; break; }
        }
        if (!pet) return;

        document.getElementById('detailTitle').textContent = 'Level Breakdown: ' + pet.Type;
        var container = document.getElementById('detailContent');
        var html = '';

        for (var lvl = 0; lvl < pet.Levels.length; lvl++) {
            var snap = pet.Levels[lvl];
            html += '<div class="level-card">';
            html += '<div class="level-card-header"><strong>Level ' + (lvl+1) + '</strong>';
            html += ccBadge(snap.CombatChance);
            html += '</div>';

            if (snap.DiceRoll) {
                html += '<div class="level-stat"><span>Dice</span><span class="val">' + escHtml(snap.DiceRoll) + '</span></div>';
            }
            html += '<div class="level-stat"><span>Avg Dmg</span><span class="val' + (snap.AvgDmg ? '' : ' zero') + '">' + (snap.AvgDmg ? snap.AvgDmg.toFixed(1) : '—') + '</span></div>';
            html += '<div class="level-stat"><span>Eff. DPS</span><span class="val' + (snap.DPS ? '' : ' zero') + '">' + (snap.DPS ? snap.DPS.toFixed(2) : '—') + '</span></div>';
            html += '<div class="level-stat"><span>Max Dmg</span><span class="val' + (snap.MaxDmg ? '' : ' zero') + '">' + (snap.MaxDmg || '—') + '</span></div>';
            html += '<div class="level-stat"><span>Capacity</span><span class="val' + (snap.Capacity ? '' : ' zero') + '">' + (snap.Capacity || '—') + '</span></div>';

            if (snap.StatMods && Object.keys(snap.StatMods).length) {
                var mods = Object.keys(snap.StatMods).sort();
                for (var m = 0; m < mods.length; m++) {
                    var v = snap.StatMods[mods[m]];
                    html += '<div class="level-stat"><span>' + escHtml(mods[m]) + '</span><span class="val">' + (v > 0 ? '+' : '') + v + '</span></div>';
                }
            }

            if (snap.BuffNames && snap.BuffNames.length) {
                html += '<div class="level-buffs">';
                for (var b = 0; b < snap.BuffNames.length; b++) {
                    html += '<span class="level-buff-chip">' + escHtml(snap.BuffNames[b]) + '</span>';
                }
                html += '</div>';
            }

            html += '</div>';
        }

        container.innerHTML = html;
        var panel = document.getElementById('detailPanel');
        panel.classList.add('open');
        panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function closeDetail() {
        document.getElementById('detailPanel').classList.remove('open');
    }

    function ccBadge(chance) {
        if (!chance) return '<span class="cc-badge cc-none">0%</span>';
        var cls = chance >= 15 ? 'cc-high' : (chance >= 10 ? 'cc-mid' : 'cc-low');
        return '<span class="cc-badge ' + cls + '">' + chance + '%</span>';
    }

    function currentRows() {
        var map = { combat: 'by_combat', utility: 'by_utility', overall: 'by_overall' };
        return (allData[map[view]] || []).slice();
    }

    function applyFilters(rows) {
        var search = document.getElementById('filterSearch').value.toLowerCase().trim();
        if (!search) return rows;
        return rows.filter(function(r) {
            return r.Type.toLowerCase().indexOf(search) !== -1 ||
                   (r.Name && r.Name.toLowerCase().indexOf(search) !== -1);
        });
    }

    function applySort(rows, key, asc) {
        return rows.slice().sort(function(a, b) {
            var av = a[key], bv = b[key];
            if (typeof av === 'string') av = av.toLowerCase();
            if (typeof bv === 'string') bv = bv.toLowerCase();
            if (av < bv) return asc ? -1 :  1;
            if (av > bv) return asc ?  1 : -1;
            return 0;
        });
    }

    function updateSortHeaders() {
        document.querySelectorAll('.rank-table th.sortable').forEach(function(th) {
            var k = th.dataset.key;
            th.classList.toggle('sorted-asc',  sortKey === k &&  sortAsc);
            th.classList.toggle('sorted-desc', sortKey === k && !sortAsc);
        });
    }

    function showError(msg) {
        var bar = document.getElementById('statusBar');
        bar.textContent = msg;
        bar.className = 'status-bar error';
    }
    function hideError() {
        document.getElementById('statusBar').className = 'status-bar';
    }

    function escHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function escAttr(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    // --- tooltip engine ---
    (function() {
        var tip = document.getElementById('tooltip');
        var SCORE_TIPS = {
            combat:  'Level-weighted combat score: at each level, DPS (avgDmg × combatChance%) is multiplied by a level weight (higher levels matter more), then averaged. Pure fighters score highest.',
            utility: 'Level-weighted utility score: at each level, total stat modifier magnitude + half buff value + 2× capacity is weighted by level, then averaged. Support pets score highest.',
            overall: 'Combined score: 3× combat + 1× utility. A balanced measure that favors combat contribution but rewards utility as a tiebreaker.'
        };

        document.getElementById('scoreHeader').dataset.tip = SCORE_TIPS['combat'];

        document.querySelectorAll('.rank-table th[data-tip]').forEach(function(th) {
            th.addEventListener('mouseenter', function(e) {
                var text = th.dataset.tip;
                if (!text) return;
                tip.textContent = text;
                tip.style.display = 'block';
                positionTip(e);
            });
            th.addEventListener('mousemove', positionTip);
            th.addEventListener('mouseleave', hideTip);
        });

        var tbody = document.getElementById('rankBody');
        var activeTipEl = null;
        tbody.addEventListener('mouseover', function(e) {
            var bar = e.target.closest('[data-spark-tip]');
            if (bar) {
                activeTipEl = bar;
                tip.textContent = bar.dataset.sparkTip;
                tip.style.display = 'block';
                positionTip(e);
                return;
            }
            var td = e.target.closest('td[data-row-tip]');
            if (td) {
                activeTipEl = td;
                tip.textContent = td.dataset.rowTip;
                tip.style.display = 'block';
                positionTip(e);
            }
        });
        tbody.addEventListener('mousemove', function(e) {
            if (tip.style.display === 'block') positionTip(e);
        });
        tbody.addEventListener('mouseout', function(e) {
            if (activeTipEl && !activeTipEl.contains(e.relatedTarget)) {
                hideTip();
                activeTipEl = null;
            }
        });

        function hideTip() { tip.style.display = 'none'; }

        function positionTip(e) {
            var pad = 12;
            var tw  = tip.offsetWidth;
            var th2 = tip.offsetHeight;
            var x   = e.clientX + pad;
            var y   = e.clientY + pad;
            if (x + tw > window.innerWidth  - pad) x = e.clientX - tw - pad;
            if (y + th2 > window.innerHeight - pad) y = e.clientY - th2 - pad;
            tip.style.left = x + 'px';
            tip.style.top  = y + 'px';
        }
    })();
})();
</script>
