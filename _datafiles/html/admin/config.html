{{template "header" .}}

<style>
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    .subtitle { color: var(--color-text-muted); margin-bottom: 1.5rem; font-size: 0.9rem; }

    /* toolbar */
    .toolbar { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .toolbar input[type="search"] {
        flex: 1; min-width: 180px; padding: 0.4rem 0.7rem;
        border: 1px solid var(--color-border-medium); border-radius: 4px; font-size: 0.9rem;
    }
    .toolbar select {
        padding: 0.4rem 0.6rem; border: 1px solid var(--color-border-medium); border-radius: 4px;
        font-size: 0.9rem; background: var(--color-surface-white);
    }
    .btn {
        padding: 0.4rem 1rem; border: none; border-radius: 4px; cursor: pointer;
        font-size: 0.875rem; font-weight: 600;
    }
    .btn-primary { background: var(--color-primary); color: var(--color-surface-white); }
    .btn-primary:hover { background: var(--color-primary-hover); }
    .btn-primary:disabled { background: var(--color-text-secondary); cursor: default; }

    /* status banner */
    #status-bar {
        display: none; padding: 0.6rem 1rem; border-radius: 4px;
        font-size: 0.875rem; margin-bottom: 1rem;
    }
    #status-bar.success { background: var(--color-success-bg); color: var(--color-success-text); display: block; }
    #status-bar.error   { background: var(--color-error-bg); color: var(--color-error-text); display: block; }

    /* config table */
    .config-table-wrap { background: var(--color-surface-white); border: 1px solid var(--color-border); border-radius: 6px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    col.col-key   { width: 38%; }
    col.col-value { width: 62%; }
    thead th {
        background: var(--color-border-faint); text-align: left; padding: 0.6rem 0.9rem;
        font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em;
        color: var(--color-text-muted); border-bottom: 1px solid var(--color-border);
    }
    tbody tr { border-bottom: 1px solid var(--color-border-light); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr.hidden-row { display: none; }
    tbody tr:hover { background: var(--color-surface-alt); }
    td { padding: 0.55rem 0.9rem; font-size: 0.875rem; vertical-align: middle; overflow: hidden; }
    td.key-cell {
        font-family: monospace; font-size: 0.82rem; color: var(--color-primary);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    tr[data-subsection] td.key-cell { padding-left: 3.2rem; }
    td.value-cell {
        max-width: 0; overflow: hidden;
    }
    td.action-cell { width: 2.5rem; text-align: right; white-space: nowrap; padding-left: 0; }

    /* inline edit */
    .value-display {
        cursor: pointer; display: block;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .value-display:hover { text-decoration: underline dotted var(--color-text-faint); }
    .value-redacted { color: var(--color-text-faint); font-style: italic; cursor: default; }
    .value-redacted:hover { text-decoration: none; }
    .edit-form { display: none; align-items: center; gap: 0.4rem; width: 100%; }
    .edit-form.active { display: flex; }
    .edit-form input[type="text"] {
        flex: 1; padding: 0.3rem 0.5rem; border: 1px solid var(--color-text-placeholder);
        border-radius: 3px; font-size: 0.875rem; font-family: inherit;
    }
    .btn-save {
        padding: 0.25rem 0.6rem; font-size: 0.8rem; border-radius: 3px;
        border: none; cursor: pointer; background: var(--color-btn-save-bg); color: var(--color-surface-white);
    }
    .btn-save:hover { background: var(--color-btn-new-hover); }
    .btn-cancel {
        padding: 0.25rem 0.6rem; font-size: 0.8rem; border-radius: 3px;
        border: none; cursor: pointer; background: var(--color-border-medium); color: var(--color-text-strong);
    }
    .btn-cancel:hover { background: var(--color-btn-cancel-hover); }

    /* locked badge */
    .badge-locked {
        display: inline-block; font-size: 0.7rem; padding: 0.1rem 0.4rem;
        background: var(--color-warning-bg); color: var(--color-warning-text); border-radius: 3px;
        border: 1px solid var(--color-warning-text); vertical-align: middle; margin-left: 0.4rem;
    }

    /* pending changes panel */
    #pending-panel {
        display: none; background: var(--color-surface-white); border: 1px solid var(--color-border); border-radius: 6px;
        padding: 1rem; margin-bottom: 1.25rem;
    }
    #pending-panel h3 { font-size: 1rem; margin-bottom: 0.75rem; }
    #pending-list { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 0.75rem; }
    .pending-item {
        display: flex; align-items: baseline; gap: 0.5rem;
        font-size: 0.875rem; background: var(--color-surface-alt);
        border: 1px solid var(--color-border-light); border-radius: 4px; padding: 0.35rem 0.65rem;
    }
    .pending-key { font-family: monospace; font-size: 0.82rem; color: var(--color-primary); flex: 1; }
    .pending-arrow { color: var(--color-text-faint); }
    .pending-val { color: var(--color-success-text); font-weight: 600; }
    .pending-remove {
        background: none; border: none; cursor: pointer; color: var(--color-text-faint);
        font-size: 1rem; line-height: 1; padding: 0 0.2rem;
    }
    .pending-remove:hover { color: var(--color-danger); }
    .pending-actions { display: flex; gap: 0.5rem; }
    .btn-discard { background: var(--color-border-light); color: var(--color-text-strong); }
    .btn-discard:hover { background: var(--color-border); }

    /* section header rows */
    tr.section-header td {
        background: var(--color-primary); color: var(--color-code-text);
        font-size: 0.78rem; font-weight: 700;
        text-transform: uppercase; letter-spacing: 0.06em;
        padding: 0.45rem 0.9rem; border-bottom: 1px solid var(--color-primary-hover);
    }

    /* subsection header rows */
    tr.subsection-header td {
        background: var(--color-surface-raised); color: var(--color-text-tertiary);
        font-size: 0.72rem; font-weight: 700;
        text-transform: uppercase; letter-spacing: 0.05em;
        padding: 0.3rem 0.9rem 0.3rem 3.2rem;
        border-bottom: 1px solid var(--color-border-strong);
        border-top: 1px solid var(--color-border-strong);
    }
    tr.subsection-header td::before {
        content: '\203A\00A0';
        color: var(--color-text-placeholder);
    }

    .no-results { padding: 1.5rem; text-align: center; color: var(--color-text-faint); font-size: 0.9rem; display: none; }

    /* description rows */
    tr.desc-row td { padding: 0.1rem 0.9rem 0.5rem; font-size: 0.78rem; color: var(--color-text-faint); font-style: italic; border-bottom: 1px solid var(--color-border-light); }
    tr.desc-row.hidden-row { display: none; }
</style>

<h1>Configuration</h1>
<p class="subtitle">Live server configuration. Click any value to edit it inline. Changes are staged until you apply them.</p>

<div id="status-bar"></div>

<div id="pending-panel">
    <h3>Pending Changes</h3>
    <div id="pending-list"></div>
    <div class="pending-actions">
        <button class="btn btn-primary" id="apply-btn" onclick="applyChanges()">Apply Changes</button>
        <button class="btn btn-discard" onclick="discardAll()">Discard All</button>
    </div>
</div>

<div class="toolbar">
    <input type="search" id="search-input" placeholder="Filter by key or value..." oninput="filterTable()" />
    <select id="section-filter" onchange="filterTable()">
        <option value="">All sections</option>
    </select>
</div>

<div class="config-table-wrap">
    <table id="config-table">
        <colgroup>
            <col class="col-key" />
            <col class="col-value" />
        </colgroup>
        <thead>
            <tr>
                <th>Key</th>
                <th>Value</th>
            </tr>
        </thead>
        <tbody id="config-body">
            <tr><td colspan="2" style="padding:1.5rem;text-align:center;color:var(--color-text-faint);">Loading...</td></tr>
        </tbody>
    </table>
    <div class="no-results" id="no-results">No matching configuration keys.</div>
</div>

    let configData = {};

        'Validation.PasswordSizeMax': 'Maximum password length.',

        'Validation.NameRejectReason': 'Message shown when a username is rejected by NameRejectRegex.',

    async function init() {
        const res = await AdminAPI.get('/admin/api/v1/config');
        if (!res.ok) {
            showStatus('Failed to load configuration: ' + res.error, false);
            return;
        }
        // Filter out Modules.* - those are managed by module-specific config pages
        const raw = res.data.data || {};
        configData = {};
        for (const [k, v] of Object.entries(raw)) {
            if (!k.startsWith('Modules.') && k !== 'Modules') configData[k] = v;
        }
        buildTable(configData);
        buildSectionFilter(configData);
    }

    // -------------------------------------------------------------------------
    // Table construction
    // -------------------------------------------------------------------------
    function buildTable(data) {
        const tbody = document.getElementById('config-body');
        tbody.innerHTML = '';

        const keys = Object.keys(data).sort((a, b) => {
            const aParts = a.split('.');
            const bParts = b.split('.');
            // Primary: section name
            if (aParts[0] < bParts[0]) return -1;
            if (aParts[0] > bParts[0]) return  1;
            // Same section: flat keys (2 parts) sort before subsection keys (3+ parts)
            const aFlat = aParts.length === 2;
            const bFlat = bParts.length === 2;
            if (aFlat && !bFlat) return -1;
            if (!aFlat && bFlat) return  1;
            // Both flat or both in subsections: alphabetical
            return a < b ? -1 : a > b ? 1 : 0;
        });
        let lastSection    = null;
        let lastSubsection = null;

        for (const key of keys) {
            const parts      = key.split('.');
            const section    = parts[0];
            const subsection = parts.length >= 3 ? parts[0] + '.' + parts[1] : null;

            if (section !== lastSection) {
                lastSection    = section;
                lastSubsection = null;
                const hdr = document.createElement('tr');
                hdr.className = 'section-header';
                hdr.dataset.section = section;
                hdr.innerHTML = `<td colspan="2">${escHtml(section)}</td>`;
                tbody.appendChild(hdr);
            }

            if (subsection !== lastSubsection) {
                lastSubsection = subsection;
                if (subsection !== null) {
                    const sub = document.createElement('tr');
                    sub.className = 'subsection-header';
                    sub.dataset.section = section;
                    sub.dataset.subsection = subsection;
                    sub.innerHTML = `<td colspan="2">${escHtml(subsection.toUpperCase())}</td>`;
                    tbody.appendChild(sub);
                }
            }

            const value = String(data[key]);
            const isRedacted = value === REDACTED;
            const desc = DESCRIPTIONS[key] || '';
            const tr = document.createElement('tr');
            tr.dataset.key = key;
            tr.dataset.section = section;
            if (subsection) tr.dataset.subsection = subsection;
            tr.dataset.value = value.toLowerCase();

            tr.innerHTML = `
                <td class="key-cell" title="${escAttr(key)}">${escHtml(key)}</td>
                <td class="value-cell">
                    <span class="value-display${isRedacted ? ' value-redacted' : ''}"
                          title="${escAttr(value)}"
                          ${isRedacted ? '' : `onclick="startEdit('${escAttr(key)}')" `}>
                        ${escHtml(value)}
                    </span>
                    <span class="edit-form" id="edit-${cssId(key)}">
                        <input type="text" id="input-${cssId(key)}" value="${escAttr(value)}"
                               onkeydown="editKeydown(event, '${escAttr(key)}')" />
                        <button class="btn-save" onclick="stageEdit('${escAttr(key)}')">Stage</button>
                        <button class="btn-cancel" onclick="cancelEdit('${escAttr(key)}')">Cancel</button>
                    </span>
                </td>`;
            tbody.appendChild(tr);

            if (desc) {
                const dr = document.createElement('tr');
                dr.className = 'desc-row';
                dr.dataset.section = section;
                if (subsection) dr.dataset.subsection = subsection;
                dr.dataset.descFor = key;
                dr.innerHTML = `<td colspan="2">${escHtml(desc)}</td>`;
                tbody.appendChild(dr);
            }
        }
    }

    function buildSectionFilter(data) {
        const sel = document.getElementById('section-filter');
        const sections = [...new Set(Object.keys(data).map(k => k.split('.')[0]))].sort();
        for (const s of sections) {
            const opt = document.createElement('option');
            opt.value = s;
            opt.textContent = s;
            sel.appendChild(opt);
        }
    }

    // -------------------------------------------------------------------------
    // Filtering
    // -------------------------------------------------------------------------
    window.filterTable = function () {
        const query = document.getElementById('search-input').value.toLowerCase();
        const section = document.getElementById('section-filter').value;
        const rows        = document.querySelectorAll('#config-body tr[data-key]');
        const headers     = document.querySelectorAll('#config-body tr.section-header');
        const subHeaders  = document.querySelectorAll('#config-body tr.subsection-header');
        const descRows    = document.querySelectorAll('#config-body tr.desc-row');
        const visibleSections    = new Set();
        const visibleSubsections = new Set();
        let anyVisible = false;

        for (const row of rows) {
            const keyMatch  = !query || row.dataset.key.toLowerCase().includes(query);
            const valMatch  = !query || row.dataset.value.includes(query);
            const secMatch  = !section || row.dataset.section === section;
            const show = (keyMatch || valMatch) && secMatch;
            row.classList.toggle('hidden-row', !show);
            if (show) {
                visibleSections.add(row.dataset.section);
                if (row.dataset.subsection) visibleSubsections.add(row.dataset.subsection);
                anyVisible = true;
            }
        }

        for (const dr of descRows) {
            const keyRow = document.querySelector(`tr[data-key="${escAttr(dr.dataset.descFor)}"]`);
            dr.classList.toggle('hidden-row', !keyRow || keyRow.classList.contains('hidden-row'));
        }

        for (const hdr of headers) {
            hdr.classList.toggle('hidden-row', !visibleSections.has(hdr.dataset.section));
        }

        for (const sub of subHeaders) {
            sub.classList.toggle('hidden-row', !visibleSubsections.has(sub.dataset.subsection));
        }

        document.getElementById('no-results').style.display = anyVisible ? 'none' : 'block';
    };

    // -------------------------------------------------------------------------
    // Inline editing
    // -------------------------------------------------------------------------
    window.startEdit = function (key) {
        cancelAllEdits();
        const form = document.getElementById('edit-' + cssId(key));
        const display = form.previousElementSibling;
        display.style.display = 'none';
        form.classList.add('active');
        const input = document.getElementById('input-' + cssId(key));
        // Pre-fill with staged value if present
        if (pending[key] !== undefined) {
            input.value = pending[key];
        }
        input.focus();
        input.select();
    };

    window.cancelEdit = function (key) {
        const form = document.getElementById('edit-' + cssId(key));
        if (!form) return;
        form.classList.remove('active');
        form.previousElementSibling.style.display = '';
    };

    window.editKeydown = function (e, key) {
        if (e.key === 'Enter') { stageEdit(key); }
        if (e.key === 'Escape') { cancelEdit(key); }
    };

    window.stageEdit = function (key) {
        const input = document.getElementById('input-' + cssId(key));
        const newVal = input.value;
        const currentVal = String(configData[key]);

        cancelEdit(key);

        if (newVal === currentVal && pending[key] === undefined) return;
        if (newVal === currentVal) {
            // reverting to original - remove from pending
            delete pending[key];
        } else {
            pending[key] = newVal;
        }

        // Update display
        const tr = document.querySelector(`tr[data-key="${escAttr(key)}"]`);
        if (tr) {
            const display = tr.querySelector('.value-display');
            display.textContent = newVal;
            tr.dataset.value = newVal.toLowerCase();
            tr.style.background = pending[key] !== undefined ? 'var(--color-warning-bg)' : '';
        }

        renderPendingPanel();
    };

    function cancelAllEdits() {
        document.querySelectorAll('.edit-form.active').forEach(f => {
            f.classList.remove('active');
            f.previousElementSibling.style.display = '';
        });
    }

    // -------------------------------------------------------------------------
    // Pending panel
    // -------------------------------------------------------------------------
    function renderPendingPanel() {
        const panel = document.getElementById('pending-panel');
        const list  = document.getElementById('pending-list');
        const keys  = Object.keys(pending);

        if (keys.length === 0) {
            panel.style.display = 'none';
            return;
        }

        panel.style.display = 'block';
        list.innerHTML = '';
        for (const key of keys.sort()) {
            const item = document.createElement('div');
            item.className = 'pending-item';
            item.innerHTML = `
                <span class="pending-key">${escHtml(key)}</span>
                <span class="pending-arrow">&rarr;</span>
                <span class="pending-val">${escHtml(pending[key])}</span>
                <button class="pending-remove" title="Remove" onclick="removePending('${escAttr(key)}')">&times;</button>`;
            list.appendChild(item);
        }
    }

    window.removePending = function (key) {
        delete pending[key];
        // Restore display value to original
        const tr = document.querySelector(`tr[data-key="${escAttr(key)}"]`);
        if (tr) {
            const display = tr.querySelector('.value-display');
            display.textContent = configData[key];
            tr.dataset.value = String(configData[key]).toLowerCase();
            tr.style.background = '';
        }
        renderPendingPanel();
    };

    window.discardAll = function () {
        for (const key of Object.keys(pending)) {
            const tr = document.querySelector(`tr[data-key="${escAttr(key)}"]`);
            if (tr) {
                const display = tr.querySelector('.value-display');
                display.textContent = configData[key];
                tr.dataset.value = String(configData[key]).toLowerCase();
                tr.style.background = '';
            }
            delete pending[key];
        }
        renderPendingPanel();
    };

    // -------------------------------------------------------------------------
    // Apply changes
    // -------------------------------------------------------------------------
    window.applyChanges = async function () {
        if (Object.keys(pending).length === 0) return;

        const btn = document.getElementById('apply-btn');
        btn.disabled = true;
        btn.textContent = 'Applying...';

        const payload = Object.assign({}, pending);
        const res = await AdminAPI.patch('/admin/api/v1/config', payload);

        btn.disabled = false;
        btn.textContent = 'Apply Changes';

        if (!res.ok) {
            showStatus('Error: ' + res.error, false);
            return;
        }

        const result = res.data.data || {};
        const applied  = result.applied  || [];
        const rejected = result.rejected || [];

        // Commit applied keys into local snapshot
        for (const key of applied) {
            configData[key] = pending[key];
            delete pending[key];
            const tr = document.querySelector(`tr[data-key="${escAttr(key)}"]`);
            if (tr) tr.style.background = '';
        }

        // Leave rejected keys in pending (still highlighted)
        let msg = '';
        if (applied.length)  msg += `Applied: ${applied.join(', ')}. `;
        if (rejected.length) msg += `Rejected (locked): ${rejected.join(', ')}.`;
        showStatus(msg || 'No changes applied.', rejected.length === 0);

        renderPendingPanel();
    };

    // -------------------------------------------------------------------------
    // Status bar
    // -------------------------------------------------------------------------
    function showStatus(msg, success) {
        const bar = document.getElementById('status-bar');
        bar.textContent = msg;
        bar.className = success ? 'success' : 'error';
        clearTimeout(bar._timer);
        bar._timer = setTimeout(() => { bar.className = ''; bar.style.display = 'none'; }, 6000);
    }

    // -------------------------------------------------------------------------
    // Utilities
    // -------------------------------------------------------------------------
    function escHtml(s) {
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function escAttr(s) {
        return String(s).replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }

    // Convert a config key like "Server.MudName" to a safe CSS id fragment.
    function cssId(key) {
        return key.replace(/[^a-zA-Z0-9_-]/g, '_');
    }

    init();
})();
</script>
