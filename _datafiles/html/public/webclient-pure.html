<!DOCTYPE html>
<html>
<head>
    <title>{{ .CONFIG.Server.MudName }} Web Terminal</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            font-family: 'DejaVu Sans Mono', monospace;
            display: flex;
            flex-direction: column;
            background-color: #1e1e1e;
            position: relative;
        }

        #main-container {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: row;
            overflow: hidden;
            background-color: #000;
        }

        #terminal {
            flex: 1;
            min-width: 0;
        }

        #input-area {
            display: flex;
            padding: 10px;
            background-color: #1e1e1e;
        }

        #command-input {
            flex: 1;
            padding: 10px;
            font-size: 16px;
            border: none;
            background-color: #333;
            color: white;
            border-radius: 0px 5px 5px 0px;
        }

        #command-input:focus {
            outline: none;
        }

        #connect-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
            padding: 20px 40px;
            font-size: 20px;
            background-color: #555;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            animation: pulse 1s infinite alternate;
        }

        #connect-button:disabled {
            color: #888;
            pointer-events: none;
            animation: none;
            background-color: #555;
            cursor: not-allowed;
        }

        @keyframes pulse {
            0%   { background-color: #555; color: white; }
            100% { color: #d17a7a; background-color: #9f4a4a; }
        }

        #menu-icon {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 26px;
            color: white;
            padding: 10px;
            cursor: pointer;
            z-index: 9999;
            background-color: rgba(30, 30, 30, 0.8);
            border-radius: 5px;
        }

        #floating-menu {
            position: absolute;
            top: 60px;
            right: 10px;
            width: 450px;
            padding: 10px;
            background-color: #2e2e2e;
            border: 1px solid #444;
            border-radius: 5px;
            display: none;
            z-index: 9999;
        }

        #floating-menu h3 {
            color: #fff;
            margin-bottom: 10px;
        }

        .slider-container {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .slider-container label {
            color: #ccc;
            width: 150px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            margin: 0 10px;
        }

        .slider-icon {
            width: 32px;
            text-align: center;
            font-size: 20px;
            color: #ccc;
        }

        #mute-container {
            margin-bottom: 15px;
            color: #ccc;
            display: flex;
            align-items: center;
        }

        #mute-container label {
            cursor: pointer;
        }

        #mute-container input[type="checkbox"] {
            margin-right: 8px;
            transform: scale(1.2);
            cursor: pointer;
        }
    </style>

    <link rel="stylesheet" href="{{ .CONFIG.FilePaths.WebCDNLocation }}/static/css/xterm.css" />
    <link rel="stylesheet" href="{{ .CONFIG.FilePaths.WebCDNLocation }}/static/css/windows.css" />

    <script src="{{ .CONFIG.FilePaths.WebCDNLocation }}/static/js/xterm.4.19.0.js"></script>
    <script src="{{ .CONFIG.FilePaths.WebCDNLocation }}/static/js/xterm-addon-fit.js"></script>
    <script src="{{ .CONFIG.FilePaths.WebCDNLocation }}/static/js/mp3.js"></script>
    <script src="{{ .CONFIG.FilePaths.WebCDNLocation }}/static/js/winbox.bundle.min.js"></script>
    <script src="{{ .CONFIG.FilePaths.WebCDNLocation }}/static/js/gmcp.js"></script>
    <script src="{{ .CONFIG.FilePaths.WebCDNLocation }}/static/js/webclient-core.js"></script>
    <!-- Left dock -->
    <script src="{{ .CONFIG.FilePaths.WebCDNLocation }}/static/js/windows/window-character.js"></script>
    <script src="{{ .CONFIG.FilePaths.WebCDNLocation }}/static/js/windows/window-vitals.js"></script>
    <script src="{{ .CONFIG.FilePaths.WebCDNLocation }}/static/js/windows/window-status.js"></script>
    <script src="{{ .CONFIG.FilePaths.WebCDNLocation }}/static/js/windows/window-party.js"></script>
    
    <!-- Right dock -->
    <script src="{{ .CONFIG.FilePaths.WebCDNLocation }}/static/js/windows/window-map.js"></script>
    <script src="{{ .CONFIG.FilePaths.WebCDNLocation }}/static/js/windows/window-comm.js"></script>
    
    
</head>
<body onload="init()">

    <div id="menu-icon" onclick="toggleMenu()">🔊</div>

    <div id="floating-menu">
        <h3>Volume Controls</h3>
        <div id="mute-container">
            <input type="checkbox" id="mute-checkbox" onchange="toggleMuteAll()">
            <label for="mute-checkbox"><span id="mute-icon">🔊</span> Mute All Sound</label>
        </div>
        <div id="sliders-container"></div>
    </div>

    <div id="main-container">
        <div id="dock-left"></div>
        <div id="terminal"></div>
        <div id="dock-right"></div>
    </div>

    <button id="connect-button">Connect to {{ .CONFIG.Server.MudName }}</button>

    <div id="input-area">
        <input type="text" id="command-input" placeholder="Enter command...">
    </div>

    <script>
        // Bridge HTML attribute event handlers to the Client namespace.
        // HTML onload/onclick attributes require globally-scoped functions.
        function init()          { Client.init(); }
        function toggleMenu()    { Client.toggleMenu(); }
        function toggleMuteAll() { Client.toggleMuteAll(); }
    </script>

</body>
</html>
