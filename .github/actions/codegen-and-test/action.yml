---
name: "Codegen and Test"
description: "Run go generate and go test"
runs:
  using: "composite"
  steps:
    - run: go generate ./...
      shell: bash
    - run: go test -race ./...
      shell: bash
    - name: Cross-compile release targets
      run: |
        tmp_dir="$(mktemp -d)"
        trap 'rm -rf "$tmp_dir"' EXIT

        build_target() {
          local goos="$1"
          local goarch="$2"
          local goarm="$3"
          local output="$4"

          echo "::group::Build $output ($goos/$goarch${goarm:+ GOARM=$goarm})"
          if [ -n "$goarm" ]; then
            env GOOS="$goos" GOARCH="$goarch" GOARM="$goarm" \
              go build -v -o "$tmp_dir/$output" .
          else
            env GOOS="$goos" GOARCH="$goarch" \
              go build -v -o "$tmp_dir/$output" .
          fi
          echo "::endgroup::"
        }

        while IFS='|' read -r _label goos goarch goarm output; do
          build_target "$goos" "$goarch" "$goarm" "$output"
        done < <(.github/scripts/release-assets.sh targets)
      shell: bash
