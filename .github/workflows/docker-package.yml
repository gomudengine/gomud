---
name: Docker Image

"on":
  workflow_call:
    inputs:
      release_tag:
        description: Stable semver release tag, such as v0.10.0
        required: true
        type: string

concurrency:
  group: docker-package-${{ inputs.release_tag }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  RELEASE_TAG: ${{ inputs.release_tag }}

jobs:
  package:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      # actions/checkout v6.0.2
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Validate stable release tag
        run: |
          set -euo pipefail

          semver_re='^v(0|[1-9][0-9]*)\.'
          semver_re="${semver_re}(0|[1-9][0-9]*)\."
          semver_re="${semver_re}(0|[1-9][0-9]*)$"
          if ! printf '%s\n' "$RELEASE_TAG" | grep -Eq "$semver_re"; then
            echo "release_tag must be a stable semver tag like v0.10.0" >&2
            exit 1
          fi

      - name: Detect Go version
        id: go-version
        # The Dockerfile build arg follows go.mod through the Makefile helper.
        run: echo "version=$(make go-version)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        # docker/setup-buildx-action v4.0.0
        # yamllint disable-line rule:line-length
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Log in to the Container registry ${{ env.REGISTRY }}
        # docker/login-action v4.1.0
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        # docker/metadata-action v6.0.0
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ env.RELEASE_TAG }}
            type=semver,pattern={{version}},value=${{ env.RELEASE_TAG }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.RELEASE_TAG }}

      - name: Build and push Docker image
        id: push
        # docker/build-push-action v7.1.0
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          push: true
          file: ./provisioning/Dockerfile
          build-args: |
            GO_VERSION=${{ steps.go-version.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docker-package
          cache-to: type=gha,mode=max,scope=docker-package

      - name: Generate artifact attestation
        # actions/attest-build-provenance v4.1.0
        # yamllint disable-line rule:line-length
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: false
