---
name: Release

"on":
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      release_label:
        description: Optional prerelease label suffix, e.g. test or rc
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prep:
    runs-on: ubuntu-24.04
    outputs:
      binary_version: ${{ steps.meta.outputs.binary_version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      datafiles_archive: ${{ steps.meta.outputs.datafiles_archive }}
      checksums_file: ${{ steps.meta.outputs.checksums_file }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Compute release metadata
        id: meta
        run: |
          binary_version="$(
            sed -n 's/^const VERSION = \"\\([^\"]*\\)\"$/\\1/p' main.go
          )"
          if [ -z "$binary_version" ]; then
            echo "Could not determine binary version from main.go" >&2
            exit 1
          fi

          release_stamp="$(date -u +%Y%m%d%H%M%S)"
          release_tag="pre-${release_stamp}-${GITHUB_SHA::7}"
          if [ -n "${{ inputs.release_label }}" ]; then
            release_tag="${release_tag}-${{ inputs.release_label }}"
          fi

          {
            echo "binary_version=${binary_version}"
            echo "release_tag=${release_tag}"
            echo "datafiles_archive=gomud-ALL-datafiles-${release_tag}.zip"
            echo "checksums_file=gomud-${release_tag}-SHA256SUMS.txt"
          } >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-24.04
    needs: prep
    env:
      BINARY_VERSION: ${{ needs.prep.outputs.binary_version }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-go

      - name: Generate code
        run: go generate ./...

      - name: Run tests
        run: go test -race ./...

      - name: Create bin directory
        run: mkdir -p bin/

      - name: Copy _datafiles to bin/
        run: cp -r _datafiles bin/

      - name: Build windows amd64
        run: >-
          env GOOS=windows GOARCH=amd64 go build -v
          -ldflags "-X main.version=${{ env.BINARY_VERSION }}"
          -o bin/gomud-windows_x64.exe .

      - name: Build darwin/arm64
        run: >-
          env GOOS=darwin GOARCH=arm64 go build -v
          -ldflags "-X main.version=${{ env.BINARY_VERSION }}"
          -o bin/gomud-darwin_arm64 .

      - name: Build darwin/amd64
        run: >-
          env GOOS=darwin GOARCH=amd64 go build -v
          -ldflags "-X main.version=${{ env.BINARY_VERSION }}"
          -o bin/gomud-darwin_x64 .

      - name: Build linux/amd64
        run: >-
          env GOOS=linux GOARCH=amd64 go build -v
          -ldflags "-X main.version=${{ env.BINARY_VERSION }}"
          -o bin/gomud-linux_x64 .

      - name: Build linux/arm5
        run: >-
          env GOOS=linux GOARCH=arm GOARM=5 go build -v
          -ldflags "-X main.version=${{ env.BINARY_VERSION }}"
          -o bin/gomud-linux_arm5 .

      - name: Upload bin
        uses: actions/upload-artifact@v4
        with:
          name: bin-artifact
          path: bin/

  release:
    runs-on: ubuntu-24.04
    needs:
      - prep
      - build
    env:
      RELEASE_TAG: ${{ needs.prep.outputs.release_tag }}
      DATAFILES_ARCHIVE: ${{ needs.prep.outputs.datafiles_archive }}
      CHECKSUMS_FILE: ${{ needs.prep.outputs.checksums_file }}
    steps:
      - name: Download builds
        uses: actions/download-artifact@v4
        with:
          name: bin-artifact
          path: bin/

      - name: Archive datafiles
        run: >-
          zip -r
          bin/${{ env.DATAFILES_ARCHIVE }}
          bin/_datafiles

      - name: Generate release checksums
        run: |
          cd bin
          sha256sum \
            gomud-windows_x64.exe \
            gomud-darwin_arm64 \
            gomud-darwin_x64 \
            gomud-linux_x64 \
            gomud-linux_arm5 \
            "${{ env.DATAFILES_ARCHIVE }}" \
            > "${{ env.CHECKSUMS_FILE }}"

      - name: Release with notes
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: |
            bin/gomud-windows_x64.exe
            bin/gomud-darwin_arm64
            bin/gomud-darwin_x64
            bin/gomud-linux_x64
            bin/gomud-linux_arm5
            bin/${{ env.DATAFILES_ARCHIVE }}
            bin/${{ env.CHECKSUMS_FILE }}
          name: ${{ env.RELEASE_TAG }}
          tag_name: ${{ env.RELEASE_TAG }}
          prerelease: true
          make_latest: false
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
