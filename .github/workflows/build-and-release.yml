---
name: Release

"on":
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing/new release tag, or latest, to publish assets to
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  prep:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      binary_version: ${{ steps.meta.outputs.binary_version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_title: ${{ steps.meta.outputs.release_title }}
      release_notes_intro: ${{ steps.meta.outputs.release_notes_intro }}
      release_notes_summary: ${{ steps.meta.outputs.release_notes_summary }}
      datafiles_archive: ${{ steps.meta.outputs.datafiles_archive }}
      checksums_file: ${{ steps.meta.outputs.checksums_file }}
    steps:
      # actions/checkout v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Compute release metadata
        id: meta
        env:
          REQUESTED_RELEASE_TAG: ${{ github.event.inputs.release_tag || '' }}
        run: |
          short_sha="$(printf '%s' "$GITHUB_SHA" | cut -c1-7)"
          timestamp="$(date -u +'%Y%m%d%H%M%S')"
          requested_release_tag="$REQUESTED_RELEASE_TAG"
          binary_version="$(
            awk -F'"' '/^const VERSION = "/ { print $2; exit }' main.go
          )"
          if [ -z "$binary_version" ]; then
            echo "Could not determine binary version from main.go" >&2
            exit 1
          fi

          if [ -n "$requested_release_tag" ]; then
            if [ "$requested_release_tag" = "latest" ]; then
              if [ "$GITHUB_REF" != "refs/heads/master" ]; then
                echo \
                  "release_tag=latest may only be used when " \
                  "workflow_dispatch runs from master" \
                  >&2
                exit 1
              fi
              release_tag="$(
                gh api "repos/${GITHUB_REPOSITORY}/releases/latest" \
                  --jq '.tag_name'
              )"
              if [ -z "$release_tag" ]; then
                echo "Could not determine latest release tag" >&2
                exit 1
              fi
              release_title="$release_tag"
              release_notes_intro="Manual release build for current latest \
          release \`${release_tag}\` from \`${GITHUB_REF_NAME}\`."
            else
              case "$requested_release_tag" in
                *[!A-Za-z0-9._-]*)
                  echo \
                    "release_tag may contain only letters, digits, ., _, and \
          -" \
                    >&2
                  exit 1
                  ;;
              esac

              release_tag="$requested_release_tag"
              release_title="$requested_release_tag"
              release_notes_intro="Manual release build for \
          \`${requested_release_tag}\` from \`${GITHUB_REF_NAME}\`."
            fi
            release_notes_summary="This run publishes assets to the \
          requested release tag."
          elif [ "$GITHUB_REF" = "refs/heads/master" ]; then
            release_tag="prerelease"
            release_title="prerelease"
            release_notes_intro="Rolling prerelease build from \`master\`."
            release_notes_summary="This release is replaced on each successful \
          merge to \`master\`."
          else
            release_tag="pre-${timestamp}-${short_sha}"
            release_title="$release_tag"
            release_notes_intro="Manual prerelease build from \
          \`${GITHUB_REF_NAME}\`."
            release_notes_summary="This is an ad hoc prerelease for the \
          selected ref and does not replace the rolling \`master\` prerelease."
          fi

          {
            echo "binary_version=${binary_version}"
            echo "release_tag=${release_tag}"
            echo "release_title=${release_title}"
            echo "release_notes_intro=${release_notes_intro}"
            echo "release_notes_summary=${release_notes_summary}"
            echo "datafiles_archive=gomud-ALL-datafiles.zip"
            echo "checksums_file=SHA256SUMS.txt"
          } >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: prep
    env:
      BINARY_VERSION: ${{ needs.prep.outputs.binary_version }}
    steps:
      # actions/checkout v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-go

      - name: Generate code
        run: go generate ./...

      - name: Run tests
        run: go test -race ./...

      - name: Create bin directory
        run: mkdir -p bin/

      - name: Copy _datafiles to bin/
        run: cp -r _datafiles bin/

      - name: Build windows amd64
        run: >-
          env GOOS=windows GOARCH=amd64 go build -v
          -ldflags "-X main.version=${BINARY_VERSION}"
          -o bin/gomud-windows_x64.exe .

      - name: Build windows arm64
        run: >-
          env GOOS=windows GOARCH=arm64 go build -v
          -ldflags "-X main.version=${BINARY_VERSION}"
          -o bin/gomud-windows_arm64.exe .

      - name: Build darwin/arm64
        run: >-
          env GOOS=darwin GOARCH=arm64 go build -v
          -ldflags "-X main.version=${BINARY_VERSION}"
          -o bin/gomud-darwin_arm64 .

      - name: Build darwin/amd64
        run: >-
          env GOOS=darwin GOARCH=amd64 go build -v
          -ldflags "-X main.version=${BINARY_VERSION}"
          -o bin/gomud-darwin_x64 .

      - name: Build linux/amd64
        run: >-
          env GOOS=linux GOARCH=amd64 go build -v
          -ldflags "-X main.version=${BINARY_VERSION}"
          -o bin/gomud-linux_x64 .

      - name: Build linux/arm64
        run: >-
          env GOOS=linux GOARCH=arm64 go build -v
          -ldflags "-X main.version=${BINARY_VERSION}"
          -o bin/gomud-linux_arm64 .

      - name: Build linux/armv7
        run: >-
          env GOOS=linux GOARCH=arm GOARM=7 go build -v
          -ldflags "-X main.version=${BINARY_VERSION}"
          -o bin/gomud-linux_armv7 .

      - name: Upload bin
        # actions/upload-artifact v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: bin-artifact
          path: bin/

  release:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write
    needs:
      - prep
      - build
    env:
      RELEASE_TAG: ${{ needs.prep.outputs.release_tag }}
      RELEASE_TITLE: ${{ needs.prep.outputs.release_title }}
      BINARY_VERSION: ${{ needs.prep.outputs.binary_version }}
      RELEASE_NOTES_INTRO: ${{ needs.prep.outputs.release_notes_intro }}
      RELEASE_NOTES_SUMMARY: ${{ needs.prep.outputs.release_notes_summary }}
      DATAFILES_ARCHIVE: ${{ needs.prep.outputs.datafiles_archive }}
      CHECKSUMS_FILE: ${{ needs.prep.outputs.checksums_file }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REQUESTED_RELEASE_TAG: ${{ github.event.inputs.release_tag || '' }}
    steps:
      # actions/checkout v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Download builds
        # actions/download-artifact v8.0.1
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: bin-artifact
          path: bin/

      - name: Archive datafiles
        run: >-
          zip -r
          "bin/${DATAFILES_ARCHIVE}"
          bin/_datafiles

      - name: Generate release checksums
        run: |
          cd bin
          sha256sum \
            gomud-windows_x64.exe \
            gomud-windows_arm64.exe \
            gomud-darwin_arm64 \
            gomud-darwin_x64 \
            gomud-linux_x64 \
            gomud-linux_arm64 \
            gomud-linux_armv7 \
            "${DATAFILES_ARCHIVE}" \
            > "${CHECKSUMS_FILE}"

      - name: Write release notes
        run: |
          latest_release_tag="$(
            gh api "repos/${GITHUB_REPOSITORY}/releases/latest" \
              --jq '.tag_name' \
              2>/dev/null || true
          )"
          generate_notes_args=(
            -f "tag_name=release-notes-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
            -f "target_commitish=${GITHUB_SHA}"
          )
          if [ -n "$latest_release_tag" ]; then
            generate_notes_args+=(-f "previous_tag_name=${latest_release_tag}")
            changes_since_line="- Changes since: \`${latest_release_tag}\`"
          else
            changes_since_line="- Changes since: initial release history"
          fi
          generated_release_notes="$(
            gh api \
              -X POST \
              "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
              "${generate_notes_args[@]}" \
              --jq '.body'
          )"
          published_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          cat > release-notes.md <<EOF
          ${RELEASE_NOTES_INTRO}

          - Version: \`${BINARY_VERSION}\`
          - Commit: \`${GITHUB_SHA}\`
          - Published: \`${published_at}\`
          ${changes_since_line}

          ${RELEASE_NOTES_SUMMARY}
          For permanent downloadable builds, use the numbered releases.

          ${generated_release_notes}
          EOF

      - name: Create prerelease
        run: |
          assets=(
            bin/gomud-windows_x64.exe
            bin/gomud-windows_arm64.exe
            bin/gomud-darwin_arm64
            bin/gomud-darwin_x64
            bin/gomud-linux_x64
            bin/gomud-linux_arm64
            bin/gomud-linux_armv7
            "bin/$DATAFILES_ARCHIVE"
            "bin/$CHECKSUMS_FILE"
          )

          if [ -n "$REQUESTED_RELEASE_TAG" ]; then
            if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
              gh api \
                -X PATCH \
                "repos/${GITHUB_REPOSITORY}/git/refs/tags/${RELEASE_TAG}" \
                -f "sha=${GITHUB_SHA}" \
                -F force=true
              gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
              gh release edit "$RELEASE_TAG" \
                --title "$RELEASE_TITLE" \
                --target "$GITHUB_SHA" \
                --notes-file release-notes.md
            else
              if gh api \
                "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" \
                >/dev/null 2>&1; then
                gh api \
                  -X PATCH \
                  "repos/${GITHUB_REPOSITORY}/git/refs/tags/${RELEASE_TAG}" \
                  -f "sha=${GITHUB_SHA}" \
                  -F force=true
              fi
              gh release create "$RELEASE_TAG" \
                "${assets[@]}" \
                --title "$RELEASE_TITLE" \
                --target "$GITHUB_SHA" \
                --notes-file release-notes.md
            fi
          else
            if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
              gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
              gh release edit "$RELEASE_TAG" \
                --title "$RELEASE_TITLE" \
                --target "$GITHUB_SHA" \
                --prerelease \
                --latest=false \
                --notes-file release-notes.md
            else
              gh release create "$RELEASE_TAG" \
                "${assets[@]}" \
                --title "$RELEASE_TITLE" \
                --target "$GITHUB_SHA" \
                --prerelease \
                --latest=false \
                --notes-file release-notes.md
            fi
          fi
