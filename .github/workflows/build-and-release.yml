---
name: Prerelease

"on":
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  DATAFILES_ARCHIVE: gomud-ALL-datafiles.zip
  CHECKSUMS_FILE: SHA256SUMS.txt

jobs:
  metadata:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      binary_version: ${{ steps.meta.outputs.binary_version }}
    steps:
      # actions/checkout v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Compute release metadata
        id: meta
        run: |
          set -euo pipefail

          binary_version="$(
            awk -F'"' '/^const VERSION = "/ { print $2; exit }' main.go
          )"
          if [ -z "$binary_version" ]; then
            echo "Could not determine binary version from main.go" >&2
            exit 1
          fi

          echo "binary_version=${binary_version}" >> "$GITHUB_OUTPUT"

  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      # actions/checkout v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-go

      - name: Generate code
        run: go generate ./...

      - name: Run tests
        run: go test -race ./...

  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs:
      - metadata
      - test
    permissions:
      contents: read
    env:
      BINARY_VERSION: ${{ needs.metadata.outputs.binary_version }}
    steps:
      # actions/checkout v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-go

      - name: Generate code
        run: go generate ./...

      - name: Build release binaries
        run: |
          set -euo pipefail

          mkdir -p dist

          while IFS='|' read -r _label goos goarch goarm asset; do
            target="${goos}/${goarch}"
            if [ -n "$goarm" ]; then
              target="${target} GOARM=${goarm}"
            fi

            echo "::group::Build ${asset} (${target})"
            env GOOS="$goos" GOARCH="$goarch" GOARM="$goarm" \
              go build \
                -ldflags "-X main.version=${BINARY_VERSION}" \
                -o "dist/${asset}" \
                .
            echo "::endgroup::"
          done < <(.github/scripts/release-assets.sh targets)

      - name: Upload release binaries
        # actions/uploadf-artifact v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-binaries
          path: dist/*
          if-no-files-found: error

  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs:
      - metadata
      - build
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      RELEASE_TAG: prerelease
      RELEASE_TITLE: prerelease
      BINARY_VERSION: ${{ needs.metadata.outputs.binary_version }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      # actions/checkout v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Download release binaries
        # actions/download-artifact v8.0.1
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-binaries
          path: bin/

      - name: Assemble release assets
        run: |
          set -euo pipefail

          mapfile -t checksum_assets < <(
            .github/scripts/release-assets.sh checksum-names
          )

          zip -r "bin/${DATAFILES_ARCHIVE}" _datafiles

          cd bin
          sha256sum "${checksum_assets[@]}" > "${CHECKSUMS_FILE}"

      - name: Write release notes
        env:
          RELEASE_KIND: prerelease
          RELEASE_NOTES_FILE: release-notes.md
        run: .github/scripts/release-notes.sh

      - name: Resolve attestation paths
        id: release-assets
        run: |
          {
            echo 'attestation_paths<<EOF'
            .github/scripts/release-assets.sh attestation-paths
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Attest release assets
        # actions/attest-build-provenance v4.1.0
        # yamllint disable-line rule:line-length
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: ${{ steps.release-assets.outputs.attestation_paths }}

      - name: Publish rolling prerelease
        run: |
          set -euo pipefail

          mapfile -t assets < <(
            .github/scripts/release-assets.sh upload-paths
          )

          if gh api \
            "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" \
            >/dev/null 2>&1; then
            gh api \
              -X PATCH \
              "repos/${GITHUB_REPOSITORY}/git/refs/tags/${RELEASE_TAG}" \
              -f "sha=${GITHUB_SHA}" \
              -F force=true
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --target "$GITHUB_SHA" \
              --prerelease \
              --latest=false \
              --notes-file release-notes.md
          else
            gh release create "$RELEASE_TAG" \
              "${assets[@]}" \
              --title "$RELEASE_TITLE" \
              --target "$GITHUB_SHA" \
              --prerelease \
              --latest=false \
              --notes-file release-notes.md
          fi
