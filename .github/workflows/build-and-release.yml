---
name: Release

"on":
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  RELEASE_FILENAME: go-mud-release
  RELEASE_VERSION: ${{ github.ref_name }}

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-go

      - name: Generate code
        run: go generate ./...

      - name: Run tests
        run: go test -race ./...

      - name: Create bin directory
        run: mkdir -p bin/

      - name: Copy _datafiles to bin/
        run: cp -r _datafiles bin/

      - name: Build windows amd64
        run: >-
          env GOOS=windows GOARCH=amd64 go build -v
          -ldflags "-X main.version=${{ env.RELEASE_VERSION }}"
          -o bin/go-mud-windows_x64.exe .

      - name: Build darwin/arm64
        run: >-
          env GOOS=darwin GOARCH=arm64 go build -v
          -ldflags "-X main.version=${{ env.RELEASE_VERSION }}"
          -o bin/go-mud-darwin_arm64 .

      - name: Build darwin/amd64
        run: >-
          env GOOS=darwin GOARCH=amd64 go build -v
          -ldflags "-X main.version=${{ env.RELEASE_VERSION }}"
          -o bin/go-mud-darwin_x64 .

      - name: Build linux/amd64
        run: >-
          env GOOS=linux GOARCH=amd64 go build -v
          -ldflags "-X main.version=${{ env.RELEASE_VERSION }}"
          -o bin/go-mud-linux_x64 .

      - name: Build linux/arm5
        run: >-
          env GOOS=linux GOARCH=arm GOARM=5 go build -v
          -ldflags "-X main.version=${{ env.RELEASE_VERSION }}"
          -o bin/go-mud-linux_arm5 .

      - name: Upload bin
        uses: actions/upload-artifact@v7
        with:
          name: bin-artifact
          path: bin/

  release:
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Download builds
        uses: actions/download-artifact@v8
        with:
          name: bin-artifact
          path: bin/

      - name: Archive release
        run: >-
          zip -r
          bin/${{ env.RELEASE_FILENAME }}-${{ env.RELEASE_VERSION }}.zip
          bin/

      - name: Release with notes
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: bin/${{ env.RELEASE_FILENAME }}-${{ env.RELEASE_VERSION }}.zip
          tag_name: ${{ env.RELEASE_VERSION }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
