---
name: Release

"on":
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prep:
    runs-on: ubuntu-24.04
    outputs:
      binary_version: ${{ steps.meta.outputs.binary_version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_title: ${{ steps.meta.outputs.release_title }}
      datafiles_archive: ${{ steps.meta.outputs.datafiles_archive }}
      checksums_file: ${{ steps.meta.outputs.checksums_file }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Compute release metadata
        id: meta
        run: |
          binary_version="$(
            awk -F'"' '/^const VERSION = "/ { print $2; exit }' main.go
          )"
          if [ -z "$binary_version" ]; then
            echo "Could not determine binary version from main.go" >&2
            exit 1
          fi

          {
            echo "binary_version=${binary_version}"
            echo "release_tag=prerelease"
            echo "release_title=prerelease"
            echo "datafiles_archive=gomud-ALL-datafiles-prerelease.zip"
            echo "checksums_file=gomud-prerelease-SHA256SUMS.txt"
          } >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-24.04
    needs: prep
    env:
      BINARY_VERSION: ${{ needs.prep.outputs.binary_version }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-go

      - name: Generate code
        run: go generate ./...

      - name: Run tests
        run: go test -race ./...

      - name: Create bin directory
        run: mkdir -p bin/

      - name: Copy _datafiles to bin/
        run: cp -r _datafiles bin/

      - name: Build windows amd64
        run: >-
          env GOOS=windows GOARCH=amd64 go build -v
          -ldflags "-X main.version=${{ env.BINARY_VERSION }}"
          -o bin/gomud-windows_x64.exe .

      - name: Build darwin/arm64
        run: >-
          env GOOS=darwin GOARCH=arm64 go build -v
          -ldflags "-X main.version=${{ env.BINARY_VERSION }}"
          -o bin/gomud-darwin_arm64 .

      - name: Build darwin/amd64
        run: >-
          env GOOS=darwin GOARCH=amd64 go build -v
          -ldflags "-X main.version=${{ env.BINARY_VERSION }}"
          -o bin/gomud-darwin_x64 .

      - name: Build linux/amd64
        run: >-
          env GOOS=linux GOARCH=amd64 go build -v
          -ldflags "-X main.version=${{ env.BINARY_VERSION }}"
          -o bin/gomud-linux_x64 .

      - name: Build linux/arm5
        run: >-
          env GOOS=linux GOARCH=arm GOARM=5 go build -v
          -ldflags "-X main.version=${{ env.BINARY_VERSION }}"
          -o bin/gomud-linux_arm5 .

      - name: Upload bin
        uses: actions/upload-artifact@v7.0.1
        with:
          name: bin-artifact
          path: bin/

  release:
    runs-on: ubuntu-24.04
    needs:
      - prep
      - build
    env:
      RELEASE_TAG: ${{ needs.prep.outputs.release_tag }}
      RELEASE_TITLE: ${{ needs.prep.outputs.release_title }}
      BINARY_VERSION: ${{ needs.prep.outputs.binary_version }}
      DATAFILES_ARCHIVE: ${{ needs.prep.outputs.datafiles_archive }}
      CHECKSUMS_FILE: ${{ needs.prep.outputs.checksums_file }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Download builds
        uses: actions/download-artifact@v8.0.1
        with:
          name: bin-artifact
          path: bin/

      - name: Archive datafiles
        run: >-
          zip -r
          bin/${{ env.DATAFILES_ARCHIVE }}
          bin/_datafiles

      - name: Generate release checksums
        run: |
          cd bin
          sha256sum \
            gomud-windows_x64.exe \
            gomud-darwin_arm64 \
            gomud-darwin_x64 \
            gomud-linux_x64 \
            gomud-linux_arm5 \
            "${{ env.DATAFILES_ARCHIVE }}" \
            > "${{ env.CHECKSUMS_FILE }}"

      - name: Write release notes
        run: |
          published_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          cat > release-notes.md <<EOF
          Rolling prerelease build from \`master\`.

          - Version: \`${BINARY_VERSION}\`
          - Commit: \`${GITHUB_SHA}\`
          - Published: \`${published_at}\`

          This release is replaced on each successful merge to \`master\`.
          For permanent downloadable builds, use the numbered releases.
          EOF

      - name: Replace rolling prerelease
        run: |
          release_id="$(
            gh release view "$RELEASE_TAG" \
              --json databaseId \
              --jq '.databaseId' \
              2>/dev/null || true
          )"
          if [ -n "$release_id" ]; then
            gh api \
              -X DELETE \
              -H "Accept: application/vnd.github+json" \
              "repos/${GITHUB_REPOSITORY}/releases/${release_id}"
          fi

          gh api \
            -X DELETE \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/git/refs/tags/${RELEASE_TAG}" \
            >/dev/null 2>&1 || true

          gh release create "$RELEASE_TAG" \
            bin/gomud-windows_x64.exe \
            bin/gomud-darwin_arm64 \
            bin/gomud-darwin_x64 \
            bin/gomud-linux_x64 \
            bin/gomud-linux_arm5 \
            "bin/$DATAFILES_ARCHIVE" \
            "bin/$CHECKSUMS_FILE" \
            --title "$RELEASE_TITLE" \
            --target "$GITHUB_SHA" \
            --prerelease \
            --latest=false \
            --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
