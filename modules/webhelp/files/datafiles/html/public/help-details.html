{{template "header" .}}

<style>
  .webhelp-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--t-border-accent);
  }

  h3.topic {
    text-align: left;
    color: var(--t-accent);
    font-size: 0.85em;
    margin: 0;
  }

  h3.topic a {
    color: var(--t-accent);
    text-decoration: none;
  }

  h3.topic a:hover {
    color: var(--t-text);
    text-decoration: underline;
  }

  .webhelp-search {
    display: flex;
    gap: 0;
  }

  .webhelp-search input[type="text"] {
    font-size: 14px;
    line-height: 1;
    padding: 7px 10px;
    background: var(--t-input-bg);
    border: 1px solid var(--t-input-border);
    border-right: none;
    border-radius: 4px 0 0 4px;
    color: var(--t-input-text);
    outline: none;
    width: 220px;
    font-family: monospace;
  }

  .webhelp-search input[type="text"]:focus {
    border-color: var(--t-input-focus);
  }

  .webhelp-search input[type="submit"] {
    font-size: 13px;
    padding: 7px 14px;
    background: var(--t-btn-bg);
    border: 1px solid var(--t-btn-border);
    border-radius: 0 4px 4px 0;
    color: var(--t-btn-text);
    cursor: pointer;
    font-family: 'Press Start 2P', monospace;
    transition: background 0.15s, color 0.15s;
  }

  .webhelp-search input[type="submit"]:hover {
    background: var(--t-btn-hover-bg);
    color: var(--t-btn-hover-text);
  }

  .webhelp-content {
    color: var(--t-text);
    background-color: var(--t-bg-deep);
    border: 1px solid var(--t-border);
    border-radius: 4px;
    text-align: left;
    padding: 20px 24px;
  }

  .webhelp-content .error {
    color: var(--t-error);
    font-weight: bold;
    font-family: monospace;
  }

  .webhelp-content pre.terminal-output {
    font-size: 15px;
    line-height: 1.5;
    white-space: pre-wrap;
    color: var(--t-text);
    font-family: monospace;
    margin: 0;
  }

  @media (max-width: 600px) {
    .webhelp-search input[type="text"] {
      width: 140px;
    }
  }
</style>

<div class="overlay">
  <div class="webhelp-header">
    <h3 class="topic"><a href="/help">Help Topics</a> :: {{ .topic }}</h3>
    <form class="webhelp-search" action="/help-details">
      <input type="text" name="search" placeholder="search..."><input type="submit" value="Go">
    </form>
  </div>

  <div class="webhelp-content">
    {{ if ne .error "" }}
      <div class="error">{{ .error }}</div>
    {{ else }}
      <pre class="terminal-output">{{ .contents }}</pre>
    {{ end }}
  </div>
</div>
<p>&nbsp;</p>

{{template "footer" .}}
