################################################################################
# If modified, these settings will be copied into your config overrides
# folder under `Modules.fasttravel`:
#
# Modules:
#   fasttravel:
#     GoldCost: 0
#     RequiredItemId: 0
#     DisallowedItemTypes: ""
#     DisallowedItemSubtypes: ""
################################################################################
# - GoldCost -
#   Gold required each time a player uses fast travel. Set to 0 to disable.
GoldCost: 0
# - RequiredItemId -
#   Item ID that is consumed each time a player uses fast travel. Set to 0 to disable.
RequiredItemId: 0
# - DisallowedItemTypes -
#   Comma-separated list of item types that prevent a player from using fast travel
#   if they are carrying, wearing, or have on their pet. Example: "weapon,grenade"
#   Valid types: weapon, offhand, head, neck, body, belt, gloves, ring, legs, feet,
#                potion, food, drink, scroll, grenade, junk, readable, key, object,
#                gemstone, lockpicks, botanical, service
DisallowedItemTypes: ""
# - DisallowedItemSubtypes -
#   Comma-separated list of item subtypes that prevent a player from using fast travel
#   if they are carrying, wearing, or have on their pet. Example: "throwable"
#   Valid subtypes: wearable, drinkable, edible, throwable, mundane,
#                  generic, bludgeoning, cleaving, piercing, slashing
DisallowedItemSubtypes: ""
