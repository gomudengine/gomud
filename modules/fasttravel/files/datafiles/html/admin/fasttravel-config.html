<style>
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    .subtitle { color: var(--color-text-muted); margin-bottom: 1.5rem; font-size: 0.9rem; }

    .btn { padding: 0.4rem 1rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.875rem; font-weight: 600; }
    .btn-primary { background: var(--color-primary); color: var(--color-surface-white); }
    .btn-primary:hover { background: var(--color-primary-hover); }
    .btn-primary:disabled { background: var(--color-text-secondary); cursor: default; }

    #status-bar { display: none; padding: 0.6rem 1rem; border-radius: 4px; font-size: 0.875rem; margin-bottom: 1rem; }
    #status-bar.success { background: var(--color-success-bg); color: var(--color-success-text); display: block; }
    #status-bar.error   { background: var(--color-error-bg); color: var(--color-error-text); display: block; }

    .config-table-wrap { background: var(--color-surface-white); border: 1px solid var(--color-border); border-radius: 6px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    col.col-key   { width: 38%; }
    col.col-value { width: 62%; }
    thead th { background: var(--color-border-faint); text-align: left; padding: 0.6rem 0.9rem; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--color-text-muted); border-bottom: 1px solid var(--color-border); }
    tbody tr { border-bottom: 1px solid var(--color-border-light); }

    tbody tr:hover { background: var(--color-surface-alt); }

    .btn-cancel:hover { background: var(--color-btn-cancel-hover); }

    #pending-panel h3 { font-size: 1rem; margin-bottom: 0.75rem; }

    .pending-key { font-family: monospace; font-size: 0.82rem; color: var(--color-primary); flex: 1; }
    .pending-arrow { color: var(--color-text-faint); }
    .pending-val { color: var(--color-success-text); font-weight: 600; }
    .pending-remove { background: none; border: none; cursor: pointer; color: var(--color-text-faint); font-size: 1rem; line-height: 1; padding: 0 0.2rem; }
    .pending-remove:hover { color: var(--color-danger); }
    .pending-actions { display: flex; gap: 0.5rem; }
    .btn-discard { background: var(--color-border-light); color: var(--color-text-strong); }
    .btn-discard:hover { background: var(--color-border); }

    .no-keys { padding: 2rem; text-align: center; color: var(--color-text-faint); font-size: 0.9rem; }
    tr.desc-row td { padding: 0.1rem 0.9rem 0.5rem; font-size: 0.78rem; color: var(--color-text-faint); font-style: italic; border-bottom: 1px solid var(--color-border-light); }

    /* ── type-picker ─────────────────────────────────────────────────────── */
    .type-picker-cell { display: flex; flex-direction: column; gap: 0.5rem; padding: 0.5rem 0; }

    /* chip strip showing selected types */
    .type-chips { display: flex; flex-wrap: wrap; gap: 0.3rem; min-height: 1.6rem; }
    .type-chip {
        display: inline-flex; align-items: center; gap: 0.25rem;
        padding: 0.15rem 0.45rem; border-radius: 3px; font-size: 0.78rem; font-family: monospace;
        background: var(--color-primary); color: var(--color-surface-white);
    }
    .type-chip button {
        background: none; border: none; cursor: pointer; color: inherit;
        font-size: 0.85rem; line-height: 1; padding: 0; opacity: 0.75;
    }
    .type-chip button:hover { opacity: 1; }
    .type-chips-empty { font-size: 0.82rem; color: var(--color-text-faint); font-style: italic; align-self: center; }

    /* dropdown + raw-input row */
    .type-picker-controls { display: flex; gap: 0.4rem; align-items: center; flex-wrap: wrap; }
    .type-picker-controls select {
        padding: 0.25rem 0.4rem; border: 1px solid var(--color-border-medium); border-radius: 3px;
        font-size: 0.82rem; background: var(--color-page-bg); cursor: pointer;

    }
    .type-picker-controls select:focus { outline: 2px solid var(--color-primary); outline-offset: 1px; }

        background: var(--color-page-bg); cursor: pointer; font-size: 0.8rem; font-weight: 600; flex-shrink: 0;
    }
    .btn-type-add:hover { background: var(--color-hover-tint); border-color: var(--color-hover-tint-border); }

    /* raw text fallback */

    .type-raw-toggle:hover { color: var(--color-primary); }
    .type-raw-row { display: none; align-items: center; gap: 0.4rem; }
    .type-raw-row.visible { display: flex; }
    .type-raw-row input[type="text"] {
        flex: 1; padding: 0.3rem 0.5rem; border: 1px solid var(--color-text-placeholder);

<h1>fasttravel - Module Config</h1>
<p class="subtitle">Configuration keys for the <strong>fasttravel</strong> module. Click any value to edit it inline. Changes are staged until you apply them.</p>

<div id="status-bar"></div>

<div id="pending-panel">
    <h3>Pending Changes</h3>
    <div id="pending-list"></div>
    <div class="pending-actions">
        <button class="btn btn-primary" id="apply-btn" onclick="applyChanges()">Apply Changes</button>
        <button class="btn btn-discard" onclick="discardAll()">Discard All</button>
    </div>
</div>

<div class="config-table-wrap">
    <table>
        <colgroup><col class="col-key" /><col class="col-value" /></colgroup>
        <thead><tr><th>Key</th><th>Value</th></tr></thead>
        <tbody id="config-body">
            <tr><td colspan="2" style="padding:1.5rem;text-align:center;color:var(--color-text-faint);">Loading...</td></tr>
        </tbody>
    </table>
</div>

<script>
(function () {
    'use strict';
    const MODULE = 'fasttravel';
    const PREFIX = 'Modules.' + MODULE + '.';
    const DESCRIPTIONS = {
        'GoldCost':               'Gold required each time a player uses fast travel. Set to 0 to disable.',
        'RequiredItemId':         'Item ID that is consumed each time a player uses fast travel. Set to 0 to disable.',
        'DisallowedItemTypes':    'Item types that block fast travel when the player carries, wears, or stores them on a pet. Select from the list or enter a comma-separated value manually.',
        'DisallowedItemSubtypes': 'Item subtypes that block fast travel when the player carries, wears, or stores them on a pet. Select from the list or enter a comma-separated value manually.',
    };

    // Keys that must always appear in the table, with their default values.
    // This ensures zero-value integer keys (GoldCost: 0, RequiredItemId: 0)
    // are shown even if the config API omits them.
    const KEY_DEFAULTS = {
        'GoldCost':               '0',
        'RequiredItemId':         '0',
        'DisallowedItemTypes':    '',
        'DisallowedItemSubtypes': '',
    };

    // Keys that use the type-picker widget instead of the plain text editor.
    const TYPE_PICKER_KEYS = new Set(['DisallowedItemTypes', 'DisallowedItemSubtypes']);

    const pending     = {};
    let   configData  = {};
    // Populated from /admin/api/v1/items/types
    let   knownTypes    = []; // [{Type, Description}, ...]
    let   knownSubtypes = []; // [{Type, Description}, ...]

    // -------------------------------------------------------------------------
    // Init
    // -------------------------------------------------------------------------
    async function init() {
        const [cfgRes, typesRes] = await AdminAPI.all([
            AdminAPI.get('/admin/api/v1/config'),
            AdminAPI.get('/admin/api/v1/items/types'),
        ]);

        if (!cfgRes.ok) { showStatus('Failed to load configuration: ' + cfgRes.error, false); return; }

        if (typesRes.ok && typesRes.data && typesRes.data.data) {
            knownTypes    = typesRes.data.data.types    || [];
            knownSubtypes = typesRes.data.data.subtypes || [];
        }

        const all = cfgRes.data.data || {};
        // Seed with known defaults so zero-value keys always appear.
        for (const [key, def] of Object.entries(KEY_DEFAULTS)) {
            configData[key] = def;
        }
        for (const [fullKey, val] of Object.entries(all)) {
            if (fullKey.startsWith(PREFIX)) {
                configData[fullKey.slice(PREFIX.length)] = String(val);
            }
        }
        buildTable();
    }

    // -------------------------------------------------------------------------
    // Table rendering
    // -------------------------------------------------------------------------
    function buildTable() {
        const tbody = document.getElementById('config-body');
        tbody.innerHTML = '';
        const keys = Object.keys(configData).sort();
        if (keys.length === 0) {
            tbody.innerHTML = '<tr><td colspan="2" class="no-keys">No configuration keys found for this module.</td></tr>';
            return;
        }
        for (const key of keys) {
            const value = configData[key];
            const tr = document.createElement('tr');
            tr.dataset.key = key;

            if (TYPE_PICKER_KEYS.has(key)) {
                const td1 = document.createElement('td');
                td1.className = 'key-cell';
                td1.title = PREFIX + key;
                td1.textContent = key;

                const td2 = document.createElement('td');
                td2.className = 'value-cell';
                td2.appendChild(buildTypePickerWidget(key, value));

                tr.appendChild(td1);
                tr.appendChild(td2);
            } else {
                tr.innerHTML =
                    '<td class="key-cell" title="' + escAttr(PREFIX + key) + '">' + escHtml(key) + '</td>' +
                    '<td class="value-cell">' +
                        '<span class="value-display" title="' + escAttr(value) + '" onclick="startEdit(\'' + escAttr(key) + '\')">' + escHtml(value) + '</span>' +
                        '<span class="edit-form" id="edit-' + cssId(key) + '">' +
                            '<input type="text" id="input-' + cssId(key) + '" value="' + escAttr(value) + '" onkeydown="editKeydown(event, \'' + escAttr(key) + '\')" />' +
                            '<button class="btn-save" onclick="stageEdit(\'' + escAttr(key) + '\')">Stage</button>' +
                            '<button class="btn-cancel" onclick="cancelEdit(\'' + escAttr(key) + '\')">Cancel</button>' +
                        '</span>' +
                    '</td>';
            }

            tbody.appendChild(tr);

            if (DESCRIPTIONS[key]) {
                const dr = document.createElement('tr');
                dr.className = 'desc-row';
                dr.dataset.descFor = key;
                dr.innerHTML = '<td colspan="2">' + escHtml(DESCRIPTIONS[key]) + '</td>';
                tbody.appendChild(dr);
            }
        }
    }

    // -------------------------------------------------------------------------
    // Type-picker widget
    // -------------------------------------------------------------------------
    function optionsForKey(key) {
        return key === 'DisallowedItemSubtypes' ? knownSubtypes : knownTypes;
    }

    // Parse a comma-separated value string into a trimmed lowercase array,
    // filtering out empty strings.
    function parseCSV(val) {
        return String(val || '').split(',')
            .map(s => s.trim().toLowerCase())
            .filter(s => s !== '');
    }

    // Serialize an array of strings back to a comma-separated value.
    function serializeCSV(arr) {
        return arr.join(',');
    }

    function buildTypePickerWidget(key, value) {
        const options  = optionsForKey(key);
        const selected = parseCSV(value);

        const wrap = document.createElement('div');
        wrap.className = 'type-picker-cell';
        wrap.id = 'tpw-' + cssId(key);

        // --- chip strip ---
        const chipStrip = document.createElement('div');
        chipStrip.className = 'type-chips';
        chipStrip.id = 'chips-' + cssId(key);
        renderChips(chipStrip, key, selected, options);
        wrap.appendChild(chipStrip);

        // --- dropdown + add button ---
        const controls = document.createElement('div');
        controls.className = 'type-picker-controls';

        const sel = document.createElement('select');
        sel.id = 'sel-' + cssId(key);
        const blankOpt = document.createElement('option');
        blankOpt.value = '';
        blankOpt.textContent = '— add a type —';
        sel.appendChild(blankOpt);
        for (const opt of options) {
            const o = document.createElement('option');
            o.value = opt.Type.toLowerCase();
            o.title = opt.Description || '';
            o.textContent = opt.Type;
            sel.appendChild(o);
        }
        controls.appendChild(sel);

        const addBtn = document.createElement('button');
        addBtn.type = 'button';
        addBtn.className = 'btn-type-add';
        addBtn.textContent = 'Add';
        addBtn.addEventListener('click', () => {
            const v = sel.value.trim().toLowerCase();
            if (!v) return;
            sel.value = '';
            addType(key, v);
        });
        controls.appendChild(addBtn);

        // raw toggle link
        const toggle = document.createElement('span');
        toggle.className = 'type-raw-toggle';
        toggle.textContent = 'edit as text';
        toggle.addEventListener('click', () => {
            const rawRow = document.getElementById('raw-' + cssId(key));
            const isVisible = rawRow.classList.toggle('visible');
            toggle.textContent = isVisible ? 'hide text editor' : 'edit as text';
            if (isVisible) {
                const inp = document.getElementById('rawinput-' + cssId(key));
                inp.value = getCurrentValue(key);
                inp.focus();
            }
        });
        controls.appendChild(toggle);

        wrap.appendChild(controls);

        // --- raw text fallback ---
        const rawRow = document.createElement('div');
        rawRow.className = 'type-raw-row';
        rawRow.id = 'raw-' + cssId(key);

        const rawInput = document.createElement('input');
        rawInput.type = 'text';
        rawInput.id = 'rawinput-' + cssId(key);
        rawInput.placeholder = 'e.g. weapon,grenade';
        rawInput.value = value;
        rawInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') applyRawInput(key);
            if (e.key === 'Escape') {
                rawRow.classList.remove('visible');
                toggle.textContent = 'edit as text';
            }
        });
        rawRow.appendChild(rawInput);

        const rawApply = document.createElement('button');
        rawApply.type = 'button';
        rawApply.className = 'btn-save';
        rawApply.textContent = 'Apply';
        rawApply.addEventListener('click', () => applyRawInput(key));
        rawRow.appendChild(rawApply);

        wrap.appendChild(rawRow);

        return wrap;
    }

    // Re-render the chip strip for a key given a current array of selected values.
    function renderChips(stripEl, key, selected, options) {
        stripEl.innerHTML = '';
        if (selected.length === 0) {
            const empty = document.createElement('span');
            empty.className = 'type-chips-empty';
            empty.textContent = 'none — all item types are allowed';
            stripEl.appendChild(empty);
            return;
        }
        // Build a label map from the known options so we can show the canonical casing.
        const labelMap = {};
        for (const opt of options) { labelMap[opt.Type.toLowerCase()] = opt.Type; }

        for (const val of selected) {
            const chip = document.createElement('span');
            chip.className = 'type-chip';
            chip.dataset.value = val;

            const label = labelMap[val] || val;
            chip.appendChild(document.createTextNode(label));

            const removeBtn = document.createElement('button');
            removeBtn.type = 'button';
            removeBtn.title = 'Remove';
            removeBtn.textContent = '\u00d7';
            removeBtn.addEventListener('click', () => removeType(key, val));
            chip.appendChild(removeBtn);

            stripEl.appendChild(chip);
        }
    }

    // Returns the current effective value for a key (pending overrides saved).
    function getCurrentValue(key) {
        return pending[key] !== undefined ? pending[key] : (configData[key] || '');
    }

    function addType(key, val) {
        const current = parseCSV(getCurrentValue(key));
        if (current.includes(val)) return; // already present
        current.push(val);
        setTypeValue(key, serializeCSV(current));
    }

    function removeType(key, val) {
        const current = parseCSV(getCurrentValue(key)).filter(v => v !== val);
        setTypeValue(key, serializeCSV(current));
    }

    function applyRawInput(key) {
        const inp = document.getElementById('rawinput-' + cssId(key));
        if (!inp) return;
        // Normalise: lowercase, trim each entry, remove duplicates, remove empties.
        const cleaned = [...new Set(parseCSV(inp.value))];
        const newVal  = serializeCSV(cleaned);
        inp.value = newVal;
        setTypeValue(key, newVal);
    }

    // Central setter: updates chips, syncs raw input if visible, stages the change.
    function setTypeValue(key, newVal) {
        const options   = optionsForKey(key);
        const selected  = parseCSV(newVal);
        const stripEl   = document.getElementById('chips-' + cssId(key));
        if (stripEl) renderChips(stripEl, key, selected, options);

        // Keep raw input in sync if it's visible.
        const rawInput = document.getElementById('rawinput-' + cssId(key));
        if (rawInput) rawInput.value = newVal;

        const tr = document.querySelector('tr[data-key="' + escAttr(key) + '"]');
        if (newVal === configData[key]) {
            delete pending[key];
            if (tr) tr.style.background = '';
        } else {
            pending[key] = newVal;
            if (tr) tr.style.background = '#fffbe6';
        }
        renderPendingPanel();
    }

    // -------------------------------------------------------------------------
    // Plain text editor (non-picker keys)
    // -------------------------------------------------------------------------
    window.startEdit = function (key) {
        cancelAllEdits();
        const form = document.getElementById('edit-' + cssId(key));
        const display = form.previousElementSibling;
        display.style.display = 'none';
        form.classList.add('active');
        const input = document.getElementById('input-' + cssId(key));
        if (pending[key] !== undefined) input.value = pending[key];
        input.focus(); input.select();
    };

    window.cancelEdit = function (key) {
        const form = document.getElementById('edit-' + cssId(key));
        if (!form) return;
        form.classList.remove('active');
        form.previousElementSibling.style.display = '';
    };

    window.editKeydown = function (e, key) {
        if (e.key === 'Enter')  stageEdit(key);
        if (e.key === 'Escape') cancelEdit(key);
    };

    window.stageEdit = function (key) {
        const input = document.getElementById('input-' + cssId(key));
        const newVal = input.value;
        cancelEdit(key);
        if (newVal === configData[key] && pending[key] === undefined) return;
        if (newVal === configData[key]) { delete pending[key]; }
        else { pending[key] = newVal; }
        const tr = document.querySelector('tr[data-key="' + escAttr(key) + '"]');
        if (tr) { tr.querySelector('.value-display').textContent = newVal; tr.style.background = pending[key] !== undefined ? '#fffbe6' : ''; }
        renderPendingPanel();
    };

    function cancelAllEdits() {
        document.querySelectorAll('.edit-form.active').forEach(f => { f.classList.remove('active'); f.previousElementSibling.style.display = ''; });
    }

    // -------------------------------------------------------------------------
    // Pending panel
    // -------------------------------------------------------------------------
    function renderPendingPanel() {
        const panel = document.getElementById('pending-panel');
        const list  = document.getElementById('pending-list');
        const keys  = Object.keys(pending);
        if (keys.length === 0) { panel.style.display = 'none'; return; }
        panel.style.display = 'block';
        list.innerHTML = '';
        for (const key of keys.sort()) {
            const item = document.createElement('div');
            item.className = 'pending-item';
            item.innerHTML = '<span class="pending-key">' + escHtml(key) + '</span><span class="pending-arrow">&rarr;</span><span class="pending-val">' + escHtml(pending[key] || '(empty)') + '</span><button class="pending-remove" onclick="removePending(\'' + escAttr(key) + '\')">\u00d7</button>';
            list.appendChild(item);
        }
    }

    window.removePending = function (key) {
        delete pending[key];
        const tr = document.querySelector('tr[data-key="' + escAttr(key) + '"]');
        if (tr) tr.style.background = '';

        if (TYPE_PICKER_KEYS.has(key)) {
            setTypeValue(key, configData[key] || '');
        } else {
            if (tr) tr.querySelector('.value-display').textContent = configData[key];
        }
        renderPendingPanel();
    };

    window.discardAll = function () {
        for (const key of Object.keys(pending)) {
            const tr = document.querySelector('tr[data-key="' + escAttr(key) + '"]');
            if (tr) tr.style.background = '';
            if (TYPE_PICKER_KEYS.has(key)) {
                setTypeValue(key, configData[key] || '');
            } else {
                if (tr) tr.querySelector('.value-display').textContent = configData[key];
            }
            delete pending[key];
        }
        renderPendingPanel();
    };

    // -------------------------------------------------------------------------
    // Apply
    // -------------------------------------------------------------------------
    window.applyChanges = async function () {
        if (Object.keys(pending).length === 0) return;
        const btn = document.getElementById('apply-btn');
        btn.disabled = true; btn.textContent = 'Applying...';
        const payload = {};
        for (const [key, val] of Object.entries(pending)) { payload[PREFIX + key] = val; }
        const res = await AdminAPI.patch('/admin/api/v1/config', payload);
        btn.disabled = false; btn.textContent = 'Apply Changes';
        if (!res.ok) { showStatus('Error: ' + res.error, false); return; }
        const result = res.data.data || {};
        const applied  = (result.applied  || []).map(k => k.startsWith(PREFIX) ? k.slice(PREFIX.length) : k);
        const rejected = (result.rejected || []).map(k => k.startsWith(PREFIX) ? k.slice(PREFIX.length) : k);
        for (const key of applied) { configData[key] = pending[key]; delete pending[key]; const tr = document.querySelector('tr[data-key="' + escAttr(key) + '"]'); if (tr) tr.style.background = ''; }
        let msg = '';
        if (applied.length)  msg += 'Applied: ' + applied.join(', ') + '. ';
        if (rejected.length) msg += 'Rejected (locked): ' + rejected.join(', ') + '.';
        showStatus(msg || 'No changes applied.', rejected.length === 0);
        renderPendingPanel();
    };

    // -------------------------------------------------------------------------
    // Helpers
    // -------------------------------------------------------------------------
    function showStatus(msg, success) {
        const bar = document.getElementById('status-bar');
        bar.textContent = msg; bar.className = success ? 'success' : 'error';
        clearTimeout(bar._t); bar._t = setTimeout(() => { bar.className = ''; bar.style.display = 'none'; }, 6000);
    }
    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function escAttr(s) { return String(s).replace(/'/g, "\\'").replace(/"/g, '&quot;'); }
    function cssId(key) { return key.replace(/[^a-zA-Z0-9_-]/g, '_'); }

    init();
})();
</script>

{{template "footer" .}}
