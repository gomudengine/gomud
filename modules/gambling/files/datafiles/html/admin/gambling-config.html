{{template "header" .}}

<style>
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    .subtitle { color: #555; margin-bottom: 1.5rem; font-size: 0.9rem; }

    .btn { padding: 0.4rem 1rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.875rem; font-weight: 600; }
    .btn-primary { background: #1a1a2e; color: #fff; }
    .btn-primary:hover { background: #2d2d4e; }
    .btn-primary:disabled { background: #999; cursor: default; }

    #status-bar { display: none; padding: 0.6rem 1rem; border-radius: 4px; font-size: 0.875rem; margin-bottom: 1rem; }
    #status-bar.success { background: #e6f4ea; color: #1e6e34; display: block; }
    #status-bar.error   { background: #fde8e8; color: #8a0000; display: block; }

    .config-table-wrap { background: #fff; border: 1px solid #ddd; border-radius: 6px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    col.col-key   { width: 38%; }
    col.col-value { width: 62%; }
    thead th { background: #f0f0f0; text-align: left; padding: 0.6rem 0.9rem; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; color: #555; border-bottom: 1px solid #ddd; }
    tbody tr { border-bottom: 1px solid #eee; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fafafa; }
    td { padding: 0.55rem 0.9rem; font-size: 0.875rem; vertical-align: middle; overflow: hidden; }
    td.key-cell { font-family: monospace; font-size: 0.82rem; color: #1a1a2e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    td.value-cell { max-width: 0; overflow: hidden; }

    .value-display { cursor: pointer; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .value-display:hover { text-decoration: underline dotted #888; }
    .edit-form { display: none; align-items: center; gap: 0.4rem; width: 100%; }
    .edit-form.active { display: flex; }
    .edit-form input[type="text"] { flex: 1; padding: 0.3rem 0.5rem; border: 1px solid #aaa; border-radius: 3px; font-size: 0.875rem; font-family: inherit; }
    .btn-save { padding: 0.25rem 0.6rem; font-size: 0.8rem; border-radius: 3px; border: none; cursor: pointer; background: #1a6e34; color: #fff; }
    .btn-save:hover { background: #145728; }
    .btn-cancel { padding: 0.25rem 0.6rem; font-size: 0.8rem; border-radius: 3px; border: none; cursor: pointer; background: #ccc; color: #333; }
    .btn-cancel:hover { background: #bbb; }

    #pending-panel { display: none; background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 1rem; margin-bottom: 1.25rem; }
    #pending-panel h3 { font-size: 1rem; margin-bottom: 0.75rem; }
    #pending-list { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 0.75rem; }
    .pending-item { display: flex; align-items: baseline; gap: 0.5rem; font-size: 0.875rem; background: #f9f9f9; border: 1px solid #eee; border-radius: 4px; padding: 0.35rem 0.65rem; }
    .pending-key { font-family: monospace; font-size: 0.82rem; color: #1a1a2e; flex: 1; }
    .pending-arrow { color: #888; }
    .pending-val { color: #1e6e34; font-weight: 600; }
    .pending-remove { background: none; border: none; cursor: pointer; color: #888; font-size: 1rem; line-height: 1; padding: 0 0.2rem; }
    .pending-remove:hover { color: #c00; }
    .pending-actions { display: flex; gap: 0.5rem; }
    .btn-discard { background: #eee; color: #333; }
    .btn-discard:hover { background: #ddd; }

    .no-keys { padding: 2rem; text-align: center; color: #888; font-size: 0.9rem; }
    tr.desc-row td { padding: 0.1rem 0.9rem 0.5rem; font-size: 0.78rem; color: #777; font-style: italic; border-bottom: 1px solid #eee; }

    .item-picker-wrap { display: flex; gap: 0.4rem; align-items: center; }
    .item-picker-display {
        flex: 1; padding: 0.3rem 0.5rem; border: 1px solid #ccc; border-radius: 3px;
        font-size: 0.875rem; background: #fff; color: #aaa; font-style: italic;
        min-height: 1.9rem; display: flex; align-items: center;
    }
    .item-picker-display.has-value { color: #1a1a2e; font-style: normal; font-family: monospace; }
    .btn-item-pick {
        padding: 0.25rem 0.6rem; border: 1px solid #ccc; border-radius: 3px;
        background: #f5f5f5; cursor: pointer; font-size: 0.8rem; font-weight: 600; flex-shrink: 0;
    }
    .btn-item-pick:hover { background: #e8eaff; border-color: #7986cb; }
</style>
<h1>gambling &mdash; Module Config</h1>
<p class="subtitle">Configuration keys for the <strong>gambling</strong> module. Click any value to edit it inline. Changes are staged until you apply them.</p>

<div id="status-bar"></div>

<div id="pending-panel">
    <h3>Pending Changes</h3>
    <div id="pending-list"></div>
    <div class="pending-actions">
        <button class="btn btn-primary" id="apply-btn" onclick="applyChanges()">Apply Changes</button>
        <button class="btn btn-discard" onclick="discardAll()">Discard All</button>
    </div>
</div>

<div class="config-table-wrap">
    <table>
        <colgroup><col class="col-key" /><col class="col-value" /></colgroup>
        <thead><tr><th>Key</th><th>Value</th></tr></thead>
        <tbody id="config-body">
            <tr><td colspan="2" style="padding:1.5rem;text-align:center;color:#888;">Loading...</td></tr>
        </tbody>
    </table>
</div>

<script>
(function () {
    'use strict';
    const MODULE = 'gambling';
    const PREFIX = 'Modules.' + MODULE + '.';
    const DESCRIPTIONS = {
        'SlotCost': 'Gold coins required to play the slot machine once.',
        'ClawCost': 'Gold coins required to play the claw machine once.',
        'ClawWinChance': 'Percentage chance (1-100) of winning a prize on the claw machine.',
        'ClawPrize1': 'Item awarded as the lucky coin prize.',
        'ClawPrize1Chance': 'Relative weight for the lucky coin prize. Set to 0 to remove from the prize pool.',
        'ClawPrize2': 'Item awarded as the empty bottle prize.',
        'ClawPrize2Chance': 'Relative weight for the empty bottle prize. Set to 0 to remove from the prize pool.',
        'ClawPrize3': 'Item awarded as the tarot deck prize.',
        'ClawPrize3Chance': 'Relative weight for the tarot deck prize. Set to 0 to remove from the prize pool.',
        'ClawPrize4': 'Item awarded as the deck of cards prize.',
        'ClawPrize4Chance': 'Relative weight for the deck of cards prize. Set to 0 to remove from the prize pool.',
        'ClawPrize5': 'Item awarded as the magic 8-ball prize.',
        'ClawPrize5Chance': 'Relative weight for the magic 8-ball prize. Set to 0 to remove from the prize pool.',
        'ClawPrize6': 'Item awarded as the 6-sided die prize.',
        'ClawPrize6Chance': 'Relative weight for the 6-sided die prize. Set to 0 to remove from the prize pool.',
    };
    const ITEM_PICKER_KEYS = new Set(['ClawPrize1','ClawPrize2','ClawPrize3','ClawPrize4','ClawPrize5','ClawPrize6']);
    const itemNameCache = {};
    const pending = {};
    let configData = {};

    async function init() {
        const [cfgRes, itemsRes] = await AdminAPI.all([
            AdminAPI.get('/admin/api/v1/config'),
            AdminAPI.get('/admin/api/v1/items'),
        ]);
        if (!cfgRes.ok) { showStatus('Failed to load configuration: ' + cfgRes.error, false); return; }
        if (itemsRes.ok) {
            const itemList = (itemsRes.data && itemsRes.data.data) || [];
            const items = Array.isArray(itemList) ? itemList : Object.values(itemList);
            for (const item of items) {
                if (item.ItemId != null) itemNameCache[item.ItemId] = item.Name || '';
            }
        }
        const all = cfgRes.data.data || {};
        for (const [fullKey, val] of Object.entries(all)) {
            if (fullKey.startsWith(PREFIX)) {
                configData[fullKey.slice(PREFIX.length)] = String(val);
            }
        }
        buildTable();
    }

    function buildTable() {
        const tbody = document.getElementById('config-body');
        tbody.innerHTML = '';
        const keys = Object.keys(configData).sort();
        if (keys.length === 0) {
            tbody.innerHTML = '<tr><td colspan="2" class="no-keys">No configuration keys found for this module.</td></tr>';
            return;
        }
        for (const key of keys) {
            const value = configData[key];
            const tr = document.createElement('tr');
            tr.dataset.key = key;
            if (ITEM_PICKER_KEYS.has(key)) {
                const itemId = parseInt(value, 10) || 0;
                const hasValue = itemId > 0;
                const displayText = hasValue ? resolveItemLabel(itemId) : 'none selected';
                tr.innerHTML =
                    '<td class="key-cell" title="' + escAttr(PREFIX + key) + '">' + escHtml(key) + '</td>' +
                    '<td class="value-cell">' +
                        '<div class="item-picker-wrap">' +
                            '<span id="item-display-' + cssId(key) + '" class="item-picker-display' + (hasValue ? ' has-value' : '') + '">' + escHtml(displayText) + '</span>' +
                            '<button type="button" class="btn-item-pick" onclick="pickPrizeItem(\'' + escAttr(key) + '\')">Pick&hellip;</button>' +
                        '</div>' +
                    '</td>';
            } else {
                tr.innerHTML =
                    '<td class="key-cell" title="' + escAttr(PREFIX + key) + '">' + escHtml(key) + '</td>' +
                    '<td class="value-cell">' +
                        '<span class="value-display" title="' + escAttr(value) + '" onclick="startEdit(\'' + escAttr(key) + '\')">' + escHtml(value) + '</span>' +
                        '<span class="edit-form" id="edit-' + cssId(key) + '">' +
                            '<input type="text" id="input-' + cssId(key) + '" value="' + escAttr(value) + '" onkeydown="editKeydown(event, \'' + escAttr(key) + '\')" />' +
                            '<button class="btn-save" onclick="stageEdit(\'' + escAttr(key) + '\')">Stage</button>' +
                            '<button class="btn-cancel" onclick="cancelEdit(\'' + escAttr(key) + '\')">Cancel</button>' +
                        '</span>' +
                    '</td>';
            }
            tbody.appendChild(tr);
            if (DESCRIPTIONS[key]) {
                const dr = document.createElement('tr');
                dr.className = 'desc-row';
                dr.dataset.descFor = key;
                dr.innerHTML = '<td colspan="2">' + escHtml(DESCRIPTIONS[key]) + '</td>';
                tbody.appendChild(dr);
            }
        }
    }

    function resolveItemLabel(itemId) {
        if (itemNameCache[itemId] !== undefined) return '#' + itemId + ' ' + itemNameCache[itemId];
        return '#' + itemId;
    }

    window.pickPrizeItem = function (key) {
        Picker.open({
            ...PickerConfigs.items,
            title: 'Select Prize Item',
            onSelect: (item) => {
                itemNameCache[item.ItemId] = item.Name;
                const newVal = String(item.ItemId);
                const display = document.getElementById('item-display-' + cssId(key));
                if (display) {
                    display.textContent = '#' + item.ItemId + ' ' + item.Name;
                    display.className = 'item-picker-display has-value';
                }
                const tr = document.querySelector('tr[data-key="' + escAttr(key) + '"]');
                if (newVal === configData[key]) {
                    delete pending[key];
                    if (tr) tr.style.background = '';
                } else {
                    pending[key] = newVal;
                    if (tr) tr.style.background = '#fffbe6';
                }
                renderPendingPanel();
            },
        });
    };

    window.startEdit = function (key) {
        cancelAllEdits();
        const form = document.getElementById('edit-' + cssId(key));
        const display = form.previousElementSibling;
        display.style.display = 'none';
        form.classList.add('active');
        const input = document.getElementById('input-' + cssId(key));
        if (pending[key] !== undefined) input.value = pending[key];
        input.focus(); input.select();
    };

    window.cancelEdit = function (key) {
        const form = document.getElementById('edit-' + cssId(key));
        if (!form) return;
        form.classList.remove('active');
        form.previousElementSibling.style.display = '';
    };

    window.editKeydown = function (e, key) {
        if (e.key === 'Enter')  stageEdit(key);
        if (e.key === 'Escape') cancelEdit(key);
    };

    window.stageEdit = function (key) {
        const input = document.getElementById('input-' + cssId(key));
        const newVal = input.value;
        cancelEdit(key);
        if (newVal === configData[key] && pending[key] === undefined) return;
        if (newVal === configData[key]) { delete pending[key]; }
        else { pending[key] = newVal; }
        const tr = document.querySelector('tr[data-key="' + escAttr(key) + '"]');
        if (tr) { tr.querySelector('.value-display').textContent = newVal; tr.style.background = pending[key] !== undefined ? '#fffbe6' : ''; }
        renderPendingPanel();
    };

    function cancelAllEdits() {
        document.querySelectorAll('.edit-form.active').forEach(f => { f.classList.remove('active'); f.previousElementSibling.style.display = ''; });
    }

    function renderPendingPanel() {
        const panel = document.getElementById('pending-panel');
        const list  = document.getElementById('pending-list');
        const keys  = Object.keys(pending);
        if (keys.length === 0) { panel.style.display = 'none'; return; }
        panel.style.display = 'block';
        list.innerHTML = '';
        for (const key of keys.sort()) {
            const item = document.createElement('div');
            item.className = 'pending-item';
            item.innerHTML = '<span class="pending-key">' + escHtml(key) + '</span><span class="pending-arrow">&rarr;</span><span class="pending-val">' + escHtml(pending[key]) + '</span><button class="pending-remove" onclick="removePending(\'' + escAttr(key) + '\')">\u00d7</button>';
            list.appendChild(item);
        }
    }

    window.removePending = function (key) {
        delete pending[key];
        const tr = document.querySelector('tr[data-key="' + escAttr(key) + '"]');
        if (tr) {
            tr.style.background = '';
            if (ITEM_PICKER_KEYS.has(key)) {
                const display = document.getElementById('item-display-' + cssId(key));
                if (display) {
                    const itemId = parseInt(configData[key], 10) || 0;
                    display.textContent = itemId > 0 ? resolveItemLabel(itemId) : 'none selected';
                    display.className = 'item-picker-display' + (itemId > 0 ? ' has-value' : '');
                }
            } else {
                tr.querySelector('.value-display').textContent = configData[key];
            }
        }
        renderPendingPanel();
    };

    window.discardAll = function () {
        for (const key of Object.keys(pending)) {
            const tr = document.querySelector('tr[data-key="' + escAttr(key) + '"]');
            if (tr) {
                tr.style.background = '';
                if (ITEM_PICKER_KEYS.has(key)) {
                    const display = document.getElementById('item-display-' + cssId(key));
                    if (display) {
                        const itemId = parseInt(configData[key], 10) || 0;
                        display.textContent = itemId > 0 ? resolveItemLabel(itemId) : 'none selected';
                        display.className = 'item-picker-display' + (itemId > 0 ? ' has-value' : '');
                    }
                } else {
                    tr.querySelector('.value-display').textContent = configData[key];
                }
            }
            delete pending[key];
        }
        renderPendingPanel();
    };

    window.applyChanges = async function () {
        if (Object.keys(pending).length === 0) return;
        const btn = document.getElementById('apply-btn');
        btn.disabled = true; btn.textContent = 'Applying...';
        const payload = {};
        for (const [key, val] of Object.entries(pending)) { payload[PREFIX + key] = val; }
        const res = await AdminAPI.patch('/admin/api/v1/config', payload);
        btn.disabled = false; btn.textContent = 'Apply Changes';
        if (!res.ok) { showStatus('Error: ' + res.error, false); return; }
        const result = res.data.data || {};
        const applied  = (result.applied  || []).map(k => k.startsWith(PREFIX) ? k.slice(PREFIX.length) : k);
        const rejected = (result.rejected || []).map(k => k.startsWith(PREFIX) ? k.slice(PREFIX.length) : k);
        for (const key of applied) { configData[key] = pending[key]; delete pending[key]; const tr = document.querySelector('tr[data-key="' + escAttr(key) + '"]'); if (tr) tr.style.background = ''; }
        let msg = '';
        if (applied.length)  msg += 'Applied: ' + applied.join(', ') + '. ';
        if (rejected.length) msg += 'Rejected (locked): ' + rejected.join(', ') + '.';
        showStatus(msg || 'No changes applied.', rejected.length === 0);
        renderPendingPanel();
    };

    function showStatus(msg, success) {
        const bar = document.getElementById('status-bar');
        bar.textContent = msg; bar.className = success ? 'success' : 'error';
        clearTimeout(bar._t); bar._t = setTimeout(() => { bar.className = ''; bar.style.display = 'none'; }, 6000);
    }
    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function escAttr(s) { return String(s).replace(/'/g, "\\'").replace(/"/g, '&quot;'); }
    function cssId(key) { return key.replace(/[^a-zA-Z0-9_-]/g, '_'); }

    init();
})();
</script>
