################################################################################
# - SlotCost -
#   The number of gold coins required to play the slot machine once.
SlotCost: 25
# - ClawCost -
#   The number of gold coins required to play the claw machine once.
ClawCost: 100
# - ClawWinChance -
#   The percentage chance (1-100) of winning a prize on the claw machine.
ClawWinChance: 10
# - ClawPrize1 -
#   Item ID for the lucky coin prize.
ClawPrize1: 1040001
# - ClawPrize1Chance -
#   Relative weight for the lucky coin prize. Set to 0 to remove from the pool.
ClawPrize1Chance: 2
# - ClawPrize2 -
#   Item ID for the empty bottle prize.
ClawPrize2: 1040004
# - ClawPrize2Chance -
#   Relative weight for the empty bottle prize. Set to 0 to remove from the pool.
ClawPrize2Chance: 8
# - ClawPrize3 -
#   Item ID for the tarot deck prize.
ClawPrize3: 1040002
# - ClawPrize3Chance -
#   Relative weight for the tarot deck prize. Set to 0 to remove from the pool.
ClawPrize3Chance: 10
# - ClawPrize4 -
#   Item ID for the deck of cards prize.
ClawPrize4: 1040005
# - ClawPrize4Chance -
#   Relative weight for the deck of cards prize. Set to 0 to remove from the pool.
ClawPrize4Chance: 20
# - ClawPrize5 -
#   Item ID for the magic 8-ball prize.
ClawPrize5: 1040003
# - ClawPrize5Chance -
#   Relative weight for the magic 8-ball prize. Set to 0 to remove from the pool.
ClawPrize5Chance: 30
# - ClawPrize6 -
#   Item ID for the 6-sided die prize.
ClawPrize6: 1040000
# - ClawPrize6Chance -
#   Relative weight for the 6-sided die prize. Set to 0 to remove from the pool.
ClawPrize6Chance: 30
