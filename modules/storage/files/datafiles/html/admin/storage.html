{{template "header" .}}

<style>
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    .subtitle { color: var(--color-text-muted); margin-bottom: 2rem; font-size: 0.9rem; }

    .panel { background: var(--color-surface-white); border: 1px solid var(--color-border); border-radius: 6px; padding: 1.25rem; margin-bottom: 2rem; }
    .panel h2 { font-size: 1rem; margin-bottom: 1rem; border-bottom: 1px solid var(--color-border-light); padding-bottom: 0.5rem; }

    .picker-bar { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
    .user-display {
        display: flex; align-items: center; gap: 0.6rem;
        background: var(--color-page-bg); border: 1px solid var(--color-border); border-radius: 4px;
        padding: 0.35rem 0.75rem; font-size: 0.875rem; min-width: 200px;
    }
    .user-display .uid { font-family: monospace; color: var(--color-text-faint); font-size: 0.8rem; }
    .user-display.empty { color: var(--color-text-placeholder); font-style: italic; }

    .btn { padding: 0.4rem 1rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.875rem; font-weight: 600; }
    .btn-primary { background: var(--color-primary); color: var(--color-surface-white); }
    .btn-primary:hover { background: var(--color-primary-hover); }
    .btn-danger { background: var(--color-error-text); color: var(--color-surface-white); font-size: 0.8rem; padding: 0.2rem 0.6rem; }
    .btn-danger:hover { background: #b00000; }

    #status-bar { display: none; padding: 0.6rem 1rem; border-radius: 4px; font-size: 0.875rem; margin-bottom: 1rem; }
    #status-bar.success { background: var(--color-success-bg); color: var(--color-success-text); display: block; }
    #status-bar.error   { background: var(--color-error-bg); color: var(--color-error-text); display: block; }

    .table-wrap { background: var(--color-surface-white); border: 1px solid var(--color-border); border-radius: 6px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
        background: var(--color-border-faint); text-align: left; padding: 0.55rem 0.9rem;
        font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.04em;
        color: var(--color-text-muted); border-bottom: 1px solid var(--color-border); white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid var(--color-border-light); }
    tbody tr:last-of-type { border-bottom: none; }
    tbody tr:hover { background: var(--color-surface-alt); }
    td { padding: 0.5rem 0.9rem; font-size: 0.85rem; vertical-align: middle; }
    .no-results { padding: 1.5rem; text-align: center; color: var(--color-text-faint); font-size: 0.9rem; }
    .item-id { font-family: monospace; font-size: 0.8rem; color: var(--color-text-subtle); }
</style>

<h1>Item Storage</h1>
<p class="subtitle">View and manage player item storage.</p>

<div id="status-bar"></div>

<div class="panel">
    <h2>Storage Lookup</h2>
    <div class="picker-bar">
        <div class="user-display empty" id="user-display">No user selected</div>
        <button class="btn btn-primary" onclick="openPicker()">Find User&hellip;</button>
    </div>
    <div class="table-wrap">
        <table id="storage-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Item Name</th>
                    <th>Item ID</th>
                    <th>Short ID</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="storage-body">
                <tr><td colspan="5" style="padding:1.5rem;text-align:center;color:var(--color-text-faint);">Select a user above to view their storage.</td></tr>
            </tbody>
        </table>
        <div class="no-results" id="no-results" style="display:none;">This user has no items in storage.</div>
    </div>
</div>

<script>
(function () {
    'use strict';

    let currentUserId = 0;

    window.openPicker = function () {
        UserPicker.open({
            onSelect: function (u) {
                currentUserId = u.user_id;

                const display = document.getElementById('user-display');
                display.className = 'user-display';
                display.innerHTML =
                    '<span>' + escHtml(u.username) + '</span>' +
                    '<span class="uid">#' + escHtml(String(u.user_id)) + '</span>';

                loadStorage(u.user_id);
            },
        });
    };

    function loadStorage(userId) {
        document.getElementById('storage-body').innerHTML =
            '<tr><td colspan="5" style="padding:1.5rem;text-align:center;color:var(--color-text-faint);">Loading\u2026</td></tr>';
        document.getElementById('no-results').style.display = 'none';

        AdminAPI.get('/admin/api/v1/storage?user_id=' + userId).then(function (res) {
            if (!res.ok) {
                showStatus('Failed to load storage: ' + (res.error || 'unknown error'), false);
                return;
            }
            renderTable(res.data.data || {});
        });
    }

    function renderTable(d) {
        const tbody = document.getElementById('storage-body');
        tbody.innerHTML = '';

        const storageItems = d.items || [];

        if (storageItems.length === 0) {
            document.getElementById('no-results').style.display = 'block';
            return;
        }
        document.getElementById('no-results').style.display = 'none';

        for (const itm of storageItems) {
            const tr = document.createElement('tr');
            tr.innerHTML =
                '<td>' + escHtml(String(itm.index)) + '</td>' +
                '<td>' + escHtml(itm.name || '') + '</td>' +
                '<td class="item-id">' + escHtml(String(itm.item_id)) + '</td>' +
                '<td class="item-id">' + escHtml(itm.short_id || '') + '</td>' +
                '<td><button class="btn btn-danger" onclick="deleteItem(' + escHtml(JSON.stringify(itm.short_id)) + ')">Remove</button></td>';
            tbody.appendChild(tr);
        }
    }

    window.deleteItem = async function (shortId) {
        if (!confirm('Remove this item from storage? It will be permanently lost.')) return;

        const res = await AdminAPI.request(
            'DELETE',
            '/admin/api/v1/storage?user_id=' + currentUserId + '&short_id=' + encodeURIComponent(shortId),
            null,
        );

        if (!res.ok) {
            showStatus('Remove failed: ' + (res.error || 'unknown error'), false);
            return;
        }

        const d = res.data.data || {};
        showStatus('Removed "' + escHtml(d.item_name || shortId) + '" from storage.', true);
        loadStorage(currentUserId);
    };

    function showStatus(msg, success) {
        const bar = document.getElementById('status-bar');
        bar.textContent = msg;
        bar.className = success ? 'success' : 'error';
        clearTimeout(bar._timer);
        bar._timer = setTimeout(function () { bar.className = ''; }, 6000);
    }

    function escHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

})();
</script>

{{template "footer" .}}
